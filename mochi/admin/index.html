function onVendorChange() {
  const sel = document.getElementById('mm-vendor');
  const preset = VENDOR_PRESETS.find(v => v.vendor === sel.value);
  if (!preset) return;
  const urlEl = document.getElementById('mm-baseurl');
  const modelEl = document.getElementById('mm-model');
  // Auto-fill base_url only if current value is empty or was auto-filled last time
  if (!urlEl.value || urlEl.value === _lastAutoBaseUrl) {
    urlEl.value = preset.baseUrl;
    _lastAutoBaseUrl = preset.baseUrl;
  }
  if (preset.placeholder) modelEl.placeholder = '例如 ' + preset.placeholder;
  else modelEl.placeholder = '';
}

function openModelModal(name) {
  _modelEditName = name || null;
  _lastAutoBaseUrl = '';
  document.getElementById('model-modal-title').textContent = name ? '编辑模型' : '添加模型';
  document.getElementById('mm-name').value = name || '';
  document.getElementById('mm-name').disabled = !!name;
  document.getElementById('mm-vendor').value = 'openai';
  document.getElementById('mm-model').value = '';
  document.getElementById('mm-apikey').value = '';
  document.getElementById('mm-apikey').placeholder = name ? '（不修改）' : 'sk-...';
  document.getElementById('mm-baseurl').value = '';
  document.getElementById('mm-test-result').innerHTML = '';
  onVendorChange();
  if (name) {
    api('GET','/models').then(models => {
      const m = models.find(x=>x.name===name);
      if (m) {
        const vendor = resolveVendorKey(m.provider, m.base_url);
        document.getElementById('mm-vendor').value = vendor;
        document.getElementById('mm-model').value = m.model;
        document.getElementById('mm-baseurl').value = m.base_url || '';
        _lastAutoBaseUrl = m.base_url || '';
        onVendorChange();
        // Restore actual base_url after onVendorChange (in case it differs from preset)
        document.getElementById('mm-baseurl').value = m.base_url || '';
      }
    });
  }
  document.getElementById('model-modal').classList.add('open');
}
function closeModelModal() { document.getElementById('model-modal').classList.remove('open'); }

async function saveModelFromModal() {
  const name = document.getElementById('mm-name').value.trim();
  if (!name) return showToast('名称不能为空');
  const apiKey = document.getElementById('mm-apikey').value;
  const preset = VENDOR_PRESETS.find(v => v.vendor === document.getElementById('mm-vendor').value) || VENDOR_PRESETS[0];
  const body = {
    name,
    provider: preset.provider,
    model: document.getElementById('mm-model').value.trim(),
    api_key: (_modelEditName && !apiKey) ? '__KEEP__' : apiKey,
    base_url: document.getElementById('mm-baseurl').value.trim(),
  };
  try {
    await api('POST','/models', body);
    showToast('模型已保存');
    closeModelModal();
    loaded.models = false;
    loadModels();
  } catch(e) { showToast('错误: ' + e.message); }
}

function editModel(name) { openModelModal(name); }

async function deleteModel(name) {
  if (!confirm('确定删除模型 "' + name + '"？')) return;
  try { await api('DELETE','/models/'+encodeURIComponent(name)); showToast('已删除'); loaded.models=false; loadModels(); }
  catch(e) { showToast('错误: ' + e.message); }
}

// ═══════ Memory ═══════
async function loadMemory() {
  loaded.memory = true;
  const el = document.getElementById('memory-content');
  const badge = document.getElementById('memory-token-badge');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 加载中...</div>';
  try {
    const data = await api('GET', '/memory');
    const approxTok = Math.round(data.chars / 2);
    const tokClass = approxTok < 600 ? 'badge-ok' : approxTok < 800 ? 'badge-warn' : 'badge-err';
    badge.className = 'badge ' + tokClass;
    badge.textContent = '~' + approxTok + ' tokens';
    el.innerHTML = `
      <textarea class="form-input" id="memory-textarea" style="min-height:200px;resize:vertical;font-family:monospace;font-size:13px;line-height:1.6"
        oninput="updateMemoryCount()">${esc(data.content)}</textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <span style="font-size:12px;color:var(--text-soft)" id="memory-char-count">~${approxTok} tokens（${data.chars.toLocaleString()} 字符）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="loadMemory()">↺ 重置</button>
          <button class="btn btn-primary btn-sm" onclick="saveMemory()">💾 保存</button>
        </div>
      </div>
    `;
  } catch (e) {
    el.innerHTML = '<div class="loading" style="color:var(--danger)">❌ ' + esc(e.message) + '</div>';
  }
  // Also load L2 memory
  searchMemoryItems(1);
}

function updateMemoryCount() {
  const ta = document.getElementById('memory-textarea');
  const el = document.getElementById('memory-char-count');
  const badge = document.getElementById('memory-token-badge');
  if (!ta || !el) return;
  const chars = ta.value.length;
  const approxTok = Math.round(chars / 2);
  el.textContent = '~' + approxTok.toLocaleString() + ' tokens（' + chars.toLocaleString() + ' 字符）';
  if (badge) {
    badge.className = 'badge ' + (approxTok < 600 ? 'badge-ok' : approxTok < 800 ? 'badge-warn' : 'badge-err');
    badge.textContent = '~' + approxTok + ' tokens';
  }
}

async function saveMemory() {
  const ta = document.getElementById('memory-textarea');
  if (!ta) return;
  try {
    await api('POST', '/memory', { content: ta.value });
    showToast('✅ Core Memory 已更新');
    loadMemory();
  } catch (e) { showToast('❌ 保存失败: ' + e.message); }
}

// ── L2 Memory ──────────────────────────────
const IMPORTANCE_STARS = ['', '★ 日常', '★★ 重要', '★★★ 关键'];
let _miCurrentPage = 1;
let _miCatsLoaded = false;

async function searchMemoryItems(page) {
  page = page || 1;
  _miCurrentPage = page;
  const el = document.getElementById('l2memory-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 搜索中...</div>';
  const q = (document.getElementById('mi-q').value || '').trim();
  const cat = document.getElementById('mi-cat').value;
  const sort = document.getElementById('mi-sort').value;
  const limit = 20;
  try {
    const params = new URLSearchParams({ page, limit, sort });
    if (q) params.set('q', q);
    if (cat) params.set('category', cat);
    const data = await api('GET', '/memory-items?' + params);

    // Populate category dropdown once
    if (!_miCatsLoaded && data.categories) {
      const sel = document.getElementById('mi-cat');
      const cur = sel.value;
      sel.innerHTML = '<option value="">全部分类</option>' +
        data.categories.map(c =>
          '<option value="' + esc(c.name === '(无)' ? '' : c.name) + '"' +
          (cur === c.name ? ' selected' : '') + '>' +
          esc(c.name) + ' (' + c.count + ')</option>'
        ).join('');
      _miCatsLoaded = true;
    }

    if (!data.items.length) {
      el.innerHTML = '<div class="loading" style="color:var(--text-soft)">没有匹配的记忆条目</div>';
      return;
    }

    const rows = data.items.map(function(item) {
      const stars = IMPORTANCE_STARS[item.importance] || item.importance;
      const starsColor = item.importance >= 3 ? 'var(--danger)' : item.importance >= 2 ? 'var(--warning)' : 'var(--text-soft)';
      const catBadge = item.category ? '<span class="badge badge-gray" style="font-size:10px">' + esc(item.category) + '</span>' : '';
      const srcBadge = '<span class="badge badge-gray" style="font-size:10px">' + esc(item.source) + '</span>';
      const ts = item.updated_at ? item.updated_at.slice(0, 16).replace('T', ' ') : '';
      return '<tr>' +
        '<td style="max-width:420px;word-break:break-all;white-space:pre-wrap;font-size:13px;line-height:1.5">' + esc(item.content) + '</td>' +
        '<td style="white-space:nowrap">' + catBadge + '</td>' +
        '<td style="color:' + starsColor + ';white-space:nowrap;font-size:12px">' + stars + '</td>' +
        '<td style="color:var(--text-soft);font-size:11px;white-space:nowrap">' + srcBadge + '</td>' +
        '<td style="color:var(--text-soft);font-size:11px;white-space:nowrap">' + item.access_count + '</td>' +
        '<td style="color:var(--text-soft);font-size:11px;white-space:nowrap">' + ts + '</td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn btn-ghost btn-sm" onclick=\'openMiEdit(' + JSON.stringify(item).replace(/'/g,"&#39;") + ')\' title="编辑">✏️</button> ' +
          '<button class="btn btn-danger btn-sm" onclick="deleteMi(' + item.id + ')" title="删除">🗑</button>' +
        '</td>' +
      '</tr>';
    }).join('');

    const pages = data.pages;
    const pageNums = Array.from({length:pages},function(_,i){return i+1})
      .filter(function(p){return p===1||p===pages||Math.abs(p-page)<=2});
    const pageBtns = pageNums.reduce(function(acc,p,i,arr){
      if(i>0 && p-arr[i-1]>1) acc.push('…');
      acc.push(p);
      return acc;
    }, []).map(function(p){
      return p==='…'
        ? '<span style="padding:4px 8px;color:var(--text-soft)">…</span>'
        : '<button class="btn '+(p===page?'btn-primary':'btn-ghost')+'" style="min-width:32px;padding:4px 10px;font-size:12px" onclick="searchMemoryItems('+p+')">'+p+'</button>';
    }).join('');

    el.innerHTML =
      '<div style="margin-bottom:10px;font-size:13px;color:var(--text-soft)">共 ' + data.total.toLocaleString() + ' 条 · 第 ' + page + '/' + pages + ' 页</div>' +
      '<div style="overflow-x:auto"><table class="tbl"><thead><tr>' +
      '<th>内容</th><th>分类</th><th>重要性</th><th>来源</th><th>访问</th><th>更新时间</th><th>操作</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
      '<div style="display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap">' +
        (page > 1 ? '<button class="btn btn-ghost btn-sm" onclick="searchMemoryItems('+(page-1)+')">‹ 上一页</button>' : '') +
        pageBtns +
        (page < pages ? '<button class="btn btn-ghost btn-sm" onclick="searchMemoryItems('+(page+1)+')">下一页 ›</button>' : '') +
      '</div>';
  } catch (e) {
    el.innerHTML = '<div class="loading" style="color:var(--danger)">❌ ' + esc(e.message) + '</div>';
  }
}

function openMiEdit(item) {
  document.getElementById('mi-edit-id').value = item.id;
  document.getElementById('mi-edit-content').value = item.content;
  document.getElementById('mi-edit-category').value = item.category || '';
  document.getElementById('mi-edit-importance').value = item.importance;
  document.getElementById('mi-modal-title').textContent = '编辑记忆 #' + item.id;
  document.getElementById('mi-modal').classList.add('open');
}

function closeMiModal() {
  document.getElementById('mi-modal').classList.remove('open');
}

async function saveMiEdit() {
  const id = document.getElementById('mi-edit-id').value;
  const content = document.getElementById('mi-edit-content').value.trim();
  const category = document.getElementById('mi-edit-category').value.trim();
  const importance = parseInt(document.getElementById('mi-edit-importance').value);
  if (!content) { showToast('❌ 内容不能为空'); return; }
  try {
    await api('POST', '/memory-items/' + id, { content, category, importance });
    showToast('✅ 记忆已更新');
    closeMiModal();
    searchMemoryItems(_miCurrentPage);
  } catch (e) { showToast('❌ 更新失败: ' + e.message); }
}

async function deleteMi(id) {
  if (!confirm('确定删除记忆 #' + id + '？\n（会移入回收站，不会永久丢失）')) return;
  try {
    await api('POST', '/memory-items/delete', { ids: [id] });
    showToast('🗑 已删除');
    searchMemoryItems(_miCurrentPage);
  } catch (e) { showToast('❌ 删除失败: ' + e.message); }
}

async function testModel(name, btn) {
  const orig = btn.textContent;
  btn.textContent = '测试中...';
  btn.disabled = true;
  try {
    const r = await api('POST','/models/'+encodeURIComponent(name)+'/test');
    if (r.ok) {
      btn.textContent = '✅ 成功';
      btn.style.color = 'var(--success)';
      showToast('✅ 模型 ' + name + ' 连接成功' + (r.latency_ms ? '（延迟 '+r.latency_ms+'ms）' : ''));
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
    } else {
      btn.textContent = '❌ 失败';
      btn.style.color = 'var(--danger)';
      showToast('❌ 模型 ' + name + ' 连接失败: ' + (r.error||'未知错误'));
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
    }
  } catch(e) {
    btn.textContent = '❌ 失败';
    btn.style.color = 'var(--danger)';
    showToast('❌ ' + e.message);
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
  }
  finally { btn.disabled = false; }
}

async function testModelInModal() {
  const res = document.getElementById('mm-test-result');
  const name = document.getElementById('mm-name').value.trim();
  if (!name) return;
  // Save first, then test
  res.innerHTML = '<span style="color:var(--text-soft)">⏳ 保存并测试中...</span>';
  try {
    await saveModelFromModal();
    const r = await api('POST','/models/'+encodeURIComponent(name)+'/test');
    if (r.ok) {
      res.innerHTML = `<span style="color:var(--success);font-weight:600;font-size:14px">✅ 连接成功！${r.latency_ms?'延迟 '+r.latency_ms+'ms':''}</span>`;
      showToast('✅ 模型 ' + name + ' 测试通过');
    } else {
      res.innerHTML = `<span style="color:var(--danger);font-weight:600;font-size:14px">❌ 连接失败: ${esc(r.error||'未知错误')}</span>`;
    }
    // Re-open modal since saveModelFromModal closes it
    document.getElementById('model-modal').classList.add('open');
  } catch(e) {
    res.innerHTML = `<span style="color:var(--danger);font-weight:600;font-size:14px">❌ ${esc(e.message)}</span>`;
    document.getElementById('model-modal').classList.add('open');
  }
}

async function assignTier(tier, modelName) {
  try {
    if (modelName) { await api('PUT','/tiers/'+tier, {model_name:modelName}); }
    else { await api('DELETE','/tiers/'+tier); }
    showToast(tier + ' 层级已更新');
    loaded.models = false;
    loaded.welcome = false;
    loadModels();
  } catch(e) { showToast('错误: ' + e.message); }
}

// ── Embedding Config helpers ──────────────

let _embApiKeySet = false;
let _lastAutoEmbBaseUrl = '';

function updateEmbeddingFields() {
  const sel = document.getElementById('emb-vendor');
  if (!sel) return;
  const v = sel.value;
  const mainFields = document.getElementById('emb-fields-main');
  const noneFields = document.getElementById('emb-fields-none');
  const azureExtra = document.getElementById('emb-azure-extra');
  const advToggle = document.getElementById('emb-advanced-toggle');

  if (v === 'none') {
    if (mainFields) mainFields.style.display = 'none';
    if (noneFields) noneFields.style.display = 'block';
    if (advToggle) advToggle.style.display = 'none';
  } else {
    if (mainFields) mainFields.style.display = 'block';
    if (noneFields) noneFields.style.display = 'none';
    if (azureExtra) azureExtra.style.display = (v === 'azure') ? 'block' : 'none';
    if (advToggle) advToggle.style.display = 'block';
  }
}

function onEmbVendorChange() {
  const sel = document.getElementById('emb-vendor');
  const preset = EMB_VENDOR_PRESETS.find(p => p.vendor === sel.value);
  if (!preset) return;
  const urlEl = document.getElementById('emb-baseurl');
  const modelEl = document.getElementById('emb-model');
  if (urlEl && (!urlEl.value || urlEl.value === _lastAutoEmbBaseUrl)) {
    urlEl.value = preset.baseUrl;
    _lastAutoEmbBaseUrl = preset.baseUrl;
  }
  if (modelEl && preset.placeholder) modelEl.placeholder = '例如 ' + preset.placeholder;
  else if (modelEl) modelEl.placeholder = '';
  updateEmbeddingFields();
}

function openEmbeddingEdit() {
  const summary = document.getElementById('emb-summary');
  const form = document.getElementById('emb-form');
  if (summary) summary.style.display = 'none';
  if (form) form.style.display = 'block';
  updateEmbeddingFields();
}

function closeEmbeddingEdit() {
  const summary = document.getElementById('emb-summary');
  const form = document.getElementById('emb-form');
  if (summary) summary.style.display = 'block';
  if (form) form.style.display = 'none';
}

async function testEmbeddingSummary(btn) {
  const orig = btn.textContent;
  btn.textContent = '测试中...';
  btn.disabled = true;
  try {
    const r = await api('POST', '/embedding/test');
    if (r.ok) {
      btn.textContent = '✅ 成功';
      btn.style.color = 'var(--success)';
      showToast('✅ Embedding 测试通过' + (r.latency_ms ? '（延迟 '+r.latency_ms+'ms）' : ''));
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
    } else {
      btn.textContent = '❌ 失败';
      btn.style.color = 'var(--danger)';
      showToast('❌ Embedding 测试失败: ' + (r.error||'未知错误'));
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
    }
  } catch(e) {
    btn.textContent = '❌ 失败';
    btn.style.color = 'var(--danger)';
    showToast('❌ ' + e.message);
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 3000);
  } finally { btn.disabled = false; }
}

async function deleteEmbeddingConfig() {
  if (!confirm('确定禁用 Embedding？这会清除 .env 中的 Embedding 配置。')) return;
  try {
    await api('PUT', '/env', {EMBEDDING_PROVIDER: 'none', EMBEDDING_API_KEY: '', EMBEDDING_MODEL: '', EMBEDDING_BASE_URL: '', AZURE_EMBEDDING_DEPLOYMENT: ''});
    showToast('Embedding 已禁用');
    loaded.models = false;
    loadModels();
  } catch(e) { showToast('错误: ' + e.message); }
}

function toggleEmbeddingAdvanced() {
  const el = document.getElementById('emb-advanced');
  const arrow = document.getElementById('emb-adv-arrow');
  if (!el) return;
  const show = el.style.display === 'none';
  el.style.display = show ? 'block' : 'none';
  if (arrow) arrow.textContent = show ? '▾' : '▸';
}

async function saveEmbeddingConfig(skipReload) {
  const vendorSel = document.getElementById('emb-vendor');
  const vendor = vendorSel ? vendorSel.value : 'none';
  const preset = EMB_VENDOR_PRESETS.find(p => p.vendor === vendor) || EMB_VENDOR_PRESETS[EMB_VENDOR_PRESETS.length - 1];
  const body = {EMBEDDING_PROVIDER: preset.provider};

  if (vendor !== 'none') {
    const apiKey = (document.getElementById('emb-apikey') || {}).value || '';
    if (apiKey.trim()) body.EMBEDDING_API_KEY = apiKey.trim();
    const model = (document.getElementById('emb-model') || {}).value || '';
    if (model.trim()) body.EMBEDDING_MODEL = model.trim();
    const baseUrl = (document.getElementById('emb-baseurl') || {}).value || '';
    if (baseUrl.trim()) body.EMBEDDING_BASE_URL = baseUrl.trim();
    if (vendor === 'azure') {
      const deployment = (document.getElementById('emb-azure-deployment') || {}).value || '';
      if (deployment.trim()) body.AZURE_EMBEDDING_DEPLOYMENT = deployment.trim();
    }
  }

  // Cache settings (always send if filled)
  const cacheSize = document.getElementById('emb-cache-size');
  const cacheTtl = document.getElementById('emb-cache-ttl');
  if (cacheSize && cacheSize.value) body.EMBEDDING_CACHE_MAX_SIZE = cacheSize.value;
  if (cacheTtl && cacheTtl.value) body.EMBEDDING_CACHE_TTL_S = cacheTtl.value;

  try {
    await api('PUT', '/env', body);
    if (!skipReload) {
      showToast('Embedding 配置已保存（重启生效）');
      loaded.models = false;
      loadModels();
    }
  } catch(e) { showToast('错误: ' + e.message); throw e; }
}

async function testEmbedding(btn) {
  const res = document.getElementById('emb-test-result');
  res.innerHTML = '<span style="color:var(--text-soft)">⏳ 保存并测试中...</span>';
  btn.disabled = true;
  try {
    await saveEmbeddingConfig(true);
    const r = await api('POST', '/embedding/test');
    if (r.ok) {
      res.innerHTML = `<span style="color:var(--success);font-weight:600">✅ 连接成功！模型: ${esc(r.model)}，维度: ${r.dim}${r.latency_ms ? '，延迟 '+r.latency_ms+'ms' : ''}</span>`;
      showToast('✅ Embedding 测试通过');
    } else {
      res.innerHTML = `<span style="color:var(--danger);font-weight:600">❌ 失败: ${esc(r.error||'未知错误')}</span>`;
    }
  } catch(e) {
    res.innerHTML = `<span style="color:var(--danger);font-weight:600">❌ ${esc(e.message)}</span>`;
  } finally { btn.disabled = false; }
}

// ═══════════════════════════════════════════
// Page 2: Heartbeat
// ═══════════════════════════════════════════
async function loadHeartbeat() {
  const el = document.getElementById('heartbeat-content');
  try {
    const [cfg, state] = await Promise.all([api('GET','/heartbeat/config'), api('GET','/heartbeat/state')]);
    let html = '';

    // State card
    html += '<div class="stat-grid">';
    html += `<div class="stat-card"><div class="stat-number" style="font-size:18px">${esc(state.state||'UNKNOWN')}</div><div class="stat-label">状态</div></div>`;
    html += `<div class="stat-card"><div class="stat-number">${state.proactive_today||0}</div><div class="stat-label">今日主动消息</div></div>`;
    html += `<div class="stat-card"><div class="stat-number">${state.proactive_limit||'—'}</div><div class="stat-label">每日上限</div></div>`;
    html += '</div>';

    // Human-readable labels & descriptions for heartbeat params
    const hbLabels = {
      HEARTBEAT_INTERVAL_MINUTES:    ['心跳间隔（分钟）',    '每隔多久执行一次心跳循环'],
      MAX_DAILY_PROACTIVE:           ['每日上限',            'Bot 每天最多主动发多少条消息'],
      FALLBACK_WAKE_HOUR:            ['兜底唤醒时间',        '睡眠状态下到几点自动唤醒'],
      SILENCE_PAUSE_DAYS:            ['静默暂停（天）',      '用户消失多少天后暂停主动消息'],
    };

    // Config groups
    const groups = [
      { title:'心跳配置', keys:['HEARTBEAT_INTERVAL_MINUTES','MAX_DAILY_PROACTIVE'] },
      { title:'睡眠/唤醒', keys:['FALLBACK_WAKE_HOUR','SILENCE_PAUSE_DAYS'] },
    ];

    for (const g of groups) {
      html += `<div class="card"><div class="card-title">${esc(g.title)}</div>`;
      for (const key of g.keys) {
        const c = cfg[key];
        if (!c) continue;
        const val = c.value;
        const isDefault = String(val) === String(c.default);
        const [label, tip] = hbLabels[key] || [key, ''];
        const resetBtn = !isDefault ? `<button class="btn btn-ghost btn-sm" onclick="resetHBParam('${key}')">恢复默认</button>` : '';
        const srcBadge = c.source === 'both' ? '<span class="badge badge-gray" style="font-size:10px;margin-left:4px">.env</span>' : '';
        if (c.type === 'bool') {
          html += `<div class="config-form-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <label class="toggle"><input type="checkbox" ${val==='true'||val===true?'checked':''} onchange="setHBParam('${key}',this.checked)"><span class="slider"></span></label>
            <div style="flex:1"><div style="font-size:14px">${esc(label)}${srcBadge}</div>${tip?`<div style="font-size:11px;color:var(--text-soft);margin-top:2px">${esc(tip)}</div>`:''}</div>
            ${resetBtn}
          </div>`;
        } else if (c.type === 'str') {
          html += `<div class="config-form-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="min-width:220px"><div style="font-size:13px">${esc(label)}${srcBadge}</div>${tip?`<div style="font-size:11px;color:var(--text-soft);margin-top:2px">${esc(tip)}</div>`:''}</div>
            <input class="form-input" style="width:260px" type="text" value="${esc(val)}" onchange="setHBParam('${key}',this.value)" data-key="${key}">
            <span style="font-size:11px;color:var(--text-soft)">默认: ${esc(c.default)}</span>
            ${resetBtn}
          </div>`;
        } else {
          const step = c.type === 'float' ? ' step="0.1"' : '';
          html += `<div class="config-form-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="min-width:220px"><div style="font-size:13px">${esc(label)}${srcBadge}</div>${tip?`<div style="font-size:11px;color:var(--text-soft);margin-top:2px">${esc(tip)}</div>`:''}</div>
            <input class="form-input" style="width:100px" type="number"${step} value="${esc(val)}" onchange="setHBParam('${key}',this.value)" data-key="${key}">
            <span style="font-size:11px;color:var(--text-soft)">默认: ${c.default}</span>
            ${resetBtn}
          </div>`;
        }
      }
      html += '</div>';
    }

    // ── Observers ──
    try {
      const observers = await api('GET','/observers');
      html += '<div class="card"><div class="card-title">观察器 Observers</div>';
      html += '<table class="tbl"><tr><th>名称</th><th>间隔（分钟）</th><th>状态</th><th>关联技能</th><th></th></tr>';
      for (const o of observers) {
        const statusBadge = !o.enabled
          ? '<span class="badge badge-err">已禁用</span>'
          : o.consecutive_errors >= 5
            ? '<span class="badge badge-err">失败</span>'
            : o.last_collected_at
              ? '<span class="badge badge-ok">运行中</span>'
              : '<span class="badge badge-gray">等待中</span>';
        const linked = o.skill_name
          ? `<span class="badge badge-info">${esc(o.skill_name)}</span>`
          : o.infrastructure
            ? '<span class="badge badge-gray">基础设施</span>'
            : '—';
        const intervalInput = o.infrastructure
          ? `<span>${o.effective_interval}</span>`
          : `<input class="form-input" style="width:70px;display:inline;font-size:12px;text-align:center" type="number" min="1" max="1440" value="${o.effective_interval}" onchange="setObserverInterval('${esc(o.name)}',this.value)">`;
        const resetBtn = o.has_override
          ? ` <button class="btn btn-ghost btn-sm" onclick="resetObserverInterval('${esc(o.name)}')">重置</button>`
          : '';
        html += `<tr>
          <td><strong>👁 ${esc(o.name)}</strong></td>
          <td>${intervalInput}${resetBtn}${o.has_override?' <span style="font-size:11px;color:var(--text-soft)">(default: '+o.default_interval+')</span>':''}</td>
          <td>${statusBadge}</td>
          <td>${linked}</td>
          <td style="font-size:11px;color:var(--text-soft)">${o.last_collected_at?'上次: '+new Date(o.last_collected_at).toLocaleTimeString():''}</td>
        </tr>`;
      }
      html += '</table></div>';
    } catch(e) {
      html += `<div class="card" style="color:var(--text-soft)">无法加载观察器</div>`;
    }

    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="card" style="color:var(--danger)">❌ ${esc(e.message)}</div>`; }
}

async function setHBParam(key, value) {
  try {
    await api('PUT','/heartbeat/config', {[key]: value});

  } catch(e) { showToast('错误: ' + e.message); }
}

async function resetHBParam(key) {

    showToast(name + ' 间隔已重置为默认值');
    loaded.heartbeat = false;
    loadHeartbeat();
  } catch(e) { showToast('错误: ' + e.message); }
}

async function loadBasic() {
  const el = document.getElementById('basic-content');
  try {
    const cfg = await api('GET','/basic/config');

    // Auto-detect browser timezone and pre-fill if value equals default
    const browserTzOffset = -(new Date().getTimezoneOffset() / 60);
    const tzCfg = cfg['TIMEZONE_OFFSET_HOURS'];

      tzCfg._autoDetected = browserTzOffset;
    }

    let html = '';

    html += '<p style="font-size:13px;color:var(--text-soft);margin-bottom:16px">💡 维护相关配置立即生效，其他配置重启后生效</p>';

    const basicLabels = {
      TIMEZONE_OFFSET_HOURS:          ['时区偏移（小时）',    'UTC 偏移量，如 +8 = 北京时间'],
      AI_CHAT_MAX_COMPLETION_TOKENS:  ['对话最大 tokens',     '单次对话回复的 token 上限'],
      MAINTENANCE_HOUR:               ['维护时间（时）',      '每天几点执行维护任务（清理、优化）'],
      MAINTENANCE_ENABLED:            ['启用维护',            '是否启用每日自动维护'],
      HEARTBEAT_LOG_TRIM_DAYS:        ['日志精简（天）',      '多少天后精简心跳日志'],
      HEARTBEAT_LOG_DELETE_DAYS:      ['日志删除（天）',      '多少天后彻底删除心跳日志'],
    };

    const groups = [
      { title:'时区', keys:['TIMEZONE_OFFSET_HOURS'] },
      { title:'对话', keys:['AI_CHAT_MAX_COMPLETION_TOKENS'] },
      { title:'维护', keys:['MAINTENANCE_HOUR','MAINTENANCE_ENABLED','HEARTBEAT_LOG_TRIM_DAYS','HEARTBEAT_LOG_DELETE_DAYS'] },
    ];

    for (const g of groups) {
      html += `<div class="card"><div class="card-title">${esc(g.title)}</div>`;
      for (const key of g.keys) {
        const c = cfg[key];
        if (!c) continue;
        const val = c.value;
        const isDefault = String(val) === String(c.default);
        const [label, tip] = basicLabels[key] || [key, ''];
        const srcBadge = c.source === 'both' ? '<span class="badge badge-gray" style="font-size:10px;margin-left:4px">.env</span>' : '';
        if (c.type === 'bool') {
          html += `<div class="config-form-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <label class="toggle"><input type="checkbox" data-basic-key="${key}" ${val==='true'||val===true?'checked':''} onchange="markBasicDirty()"><span class="slider"></span></label>
            <div style="flex:1"><div style="font-size:14px">${esc(label)}${srcBadge}</div>${tip?`<div style="font-size:11px;color:var(--text-soft);margin-top:2px">${esc(tip)}</div>`:''}</div>
            ${!isDefault?`<button class="btn btn-ghost btn-sm" onclick="resetBasicParam('${key}')">恢复默认</button>`:''}
          </div>`;
        } else {
          const step = c.type === 'float' ? ' step="0.1"' : '';
          const displayVal = c._autoDetected !== undefined ? c._autoDetected : val;
          const autoTag = c._autoDetected !== undefined ? `<span style="font-size:11px;color:var(--accent);margin-left:4px">🌐 已自动检测</span>` : '';
          html += `<div class="config-form-row" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <div style="min-width:220px"><div style="font-size:13px">${esc(label)}${autoTag}${srcBadge}</div>${tip?`<div style="font-size:11px;color:var(--text-soft);margin-top:2px">${esc(tip)}</div>`:''}</div>
            <input class="form-input" style="width:100px" type="number"${step} data-basic-key="${key}" value="${esc(displayVal)}" oninput="markBasicDirty()">

          </div>`;
        }
      }
      html += '</div>';
    }

    html += '<div style="margin-top:16px;display:flex;align-items:center;gap:12px">'

      + '<span id="basic-save-hint" style="font-size:12px;color:var(--text-soft)"></span>'
      + '</div>';

    el.innerHTML = html;

    if (tzCfg && tzCfg._autoDetected !== undefined) markBasicDirty();

function markBasicDirty() {
  const btn = document.getElementById('basic-save-btn');
  const hint = document.getElementById('basic-save-hint');
  if (btn) btn.disabled = false;
  if (hint) hint.textContent = '有未保存的修改';
}

function _collectBasicValues() {
  const body = {};
  document.querySelectorAll('[data-basic-key]').forEach(el => {
    const key = el.dataset.basicKey;
    if (el.type === 'checkbox') body[key] = el.checked;
    else body[key] = el.value;
  });
  return body;
}

async function saveAllBasic() {
  const btn = document.getElementById('basic-save-btn');
  const hint = document.getElementById('basic-save-hint');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }
  try {
    const body = _collectBasicValues();
    await api('PUT','/basic/config', body);
    showToast('配置已保存');
    if (hint) hint.textContent = '';
    if (btn) btn.textContent = '保存';
    loaded.welcome = false; // refresh setup status so checkmark updates
    loadWelcome(); // eagerly refresh so checkmark appears immediately
  } catch(e) {
    showToast('错误: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = '保存'; }
  }
}

async function resetBasicParam(key) {
  try {
    await api('PUT','/basic/config', {[key]: null});
    showToast(key + ' 已恢复默认值');
    loaded.basic = false;
    loadBasic();
  } catch(e) { showToast('错误: ' + e.message); }
}

// ═══════════════════════════════════════════
// Page 3: Skills
// ═══════════════════════════════════════════
async function loadSkills() {
  const el = document.getElementById('skills-content');
  try {
    const [skills, statusData] = await Promise.all([
      api('GET','/skills'),
      api('GET','/status'),
    ]);
    // Detect active transports for exclude_transports filtering
    const activeTransports = [];
    const cs = statusData && statusData.config_status || {};
    if (cs.telegram_bot_token && cs.telegram_bot_token.set) activeTransports.push('telegram');
    if (cs.weixin_enabled && cs.weixin_enabled.set) activeTransports.push('wechat');

    if (skills.length === 0) {
      el.innerHTML = '<div class="card"><p style="color:var(--text-soft)">没有注册的技能。</p></div>';
      return;
    }
    const typeIcons = { tool:'🔧', automation:'🤖', hybrid:'⚡', observer:'👁' };
    const typeLabels = { tool:'工具', automation:'自动化', hybrid:'混合', observer:'观察器' };
    skills.sort((a, b) => (b.core ? 1 : 0) - (a.core ? 1 : 0));
    let html = '';
    for (const s of skills) {
      const icon = typeIcons[s.type] || '📦';
      const typeLabel = typeLabels[s.type] || s.type;
      const senseBadge = s.has_observer ? ' <span class="badge badge-info">观察器</span>' : '';
      const configMissing = s.config_missing && s.config_missing.length > 0;
      const excludedOn = (s.exclude_transports || []).filter(t => activeTransports.includes(t));
      const transportExcluded = excludedOn.length > 0;
      let toggleHtml;
      if (s.core) {
        toggleHtml = '<span class="badge" style="background:var(--text-soft);color:#fff;font-size:11px">🔒 核心</span>';
      } else if (s.auto_disabled) {
        toggleHtml = '<label class="toggle" title="需要先配置必填项"><input type="checkbox" disabled><span class="slider"></span></label>'
          + ' <span style="font-size:11px;color:var(--danger)">需要配置</span>';
      } else if (transportExcluded) {
        const label = excludedOn.map(t => t === 'wechat' ? '微信' : 'Telegram').join('、');
        toggleHtml = '<label class="toggle" title="此渠道不支持"><input type="checkbox" disabled><span class="slider"></span></label>'
          + ` <span style="font-size:11px;color:var(--text-soft)">${label}不可用</span>`;
      } else {
        toggleHtml = `<label class="toggle"><input type="checkbox" ${s.enabled?'checked':''} onchange="toggleSkill('${esc(s.name)}',this.checked)"><span class="slider"></span></label>`;
      }
      html += `<div class="skill-card ${s.enabled && !transportExcluded?'':'disabled'}">
        <div class="skill-header">
          <div><span class="skill-name">${icon} ${esc(s.name)}</span> <span class="badge badge-gray">${esc(typeLabel)}</span>${senseBadge}</div>
          ${toggleHtml}
        </div>
        ${s.description?`<div class="skill-desc">${esc(s.description)}</div>`:''}
        <div class="skill-tools">${(s.tools||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join('')}</div>`;

      // Config section — merge requires_config (connection) + config_schema (options)
      const schemaKeys = (s.config_schema || []).filter(e => !e.internal);
      const schemaKeySet = new Set(schemaKeys.map(e => e.key));
      const requireKeys = (s.requires_config || []).filter(k => !schemaKeySet.has(k));
      const hasSchema = schemaKeys.length > 0;
      const hasRequires = requireKeys.length > 0;

      if (hasSchema || hasRequires) {
        // requires (connection secrets) first, then schema (options)
        const configKeys = [
          ...requireKeys.map(k => ({key:k, secret:true, desc:'', isSet: s.config_status && s.config_status[k]})),
          ...schemaKeys.map(e => ({key:e.key, secret:e.secret, desc:e.description, isSet: s.config_status && s.config_status[e.key]})),
        ];

        html += '<div class="config-list"><div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:4px">配置</div>';
        for (const c of configKeys) {
          html += `<div class="config-item">${c.isSet?statusIcon('ok'):statusIcon('err')}<code style="font-size:12px">${esc(c.key)}</code>`;
          if (c.desc) html += ` <span style="font-size:11px;color:var(--text-soft);margin-left:4px">${esc(c.desc)}</span>`;
          html += '</div>';
        }
        const keysJson = JSON.stringify(configKeys.map(c=>({key:c.key,secret:c.secret}))).replace(/"/g,'&quot;');
        html += `<button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="toggleSkillConfig('${esc(s.name)}')">配置</button>`;
        html += `<div id="skill-cfg-${esc(s.name)}" style="display:${configMissing?'block':'none'};margin-top:8px">`;
        for (const c of configKeys) {
          const inputType = c.secret ? 'password' : 'text';
          html += `<div class="form-group"><label class="form-label">${esc(c.key)}</label><input class="form-input" id="scfg-${esc(s.name)}-${esc(c.key)}" type="${inputType}" autocomplete="off" placeholder="${esc(c.desc||c.key)}"></div>`;
        }
        html += `<button class="btn btn-primary btn-sm" onclick="saveSkillConfig('${esc(s.name)}')">保存</button>`;
        html += `<span style="font-size:11px;color:var(--text-soft);margin-left:8px">保存到数据库（立即生效）</span>`;
        html += '</div></div>';
      }
      // Habit skill: placeholder for read-only habit list
      if (s.name === 'habit') {
        html += '<div id="habit-list-section" style="margin-top:8px"></div>';
      }
      html += '</div>';
    }
    el.innerHTML = html;
    // Load habit list if habit skill is present
    loadHabitList();
  } catch(e) { el.innerHTML = `<div class="card" style="color:var(--danger)">❌ ${esc(e.message)}</div>`; }
}

async function loadHabitList() {
  const el = document.getElementById('habit-list-section');
  if (!el) return;
  try {
    const data = await api('GET', '/skills/habit/habits');
    const habits = data.habits || [];
    if (!habits.length) {
      el.innerHTML = '<div style="font-size:12px;color:var(--text-soft);padding:4px 0">暂无习惯 — 通过对话添加</div>';
      return;
    }
    let h = '<div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:4px">当前习惯</div>';
    h += '<table class="tbl" style="font-size:12px"><thead><tr><th>名称</th><th>频率</th><th>重要性</th><th>状态</th></tr></thead><tbody>';
    for (const hab of habits) {
      let status, badge;
      if (!hab.active) { status = '已停用'; badge = 'badge-gray'; }
      else if (hab.paused_until) { status = '暂停至 ' + hab.paused_until; badge = 'badge-warn'; }
      else { status = '活跃'; badge = 'badge-ok'; }
      const imp = hab.importance === 'important' ? '<span class="badge badge-err" style="font-size:10px">重要</span>' : '';
      h += `<tr><td>${esc(hab.name)}${hab.context ? ' <span style="color:var(--text-soft)">(' + esc(hab.context) + ')</span>' : ''}</td><td>${esc(hab.frequency)}</td><td>${imp || '普通'}</td><td><span class="badge ${badge}" style="font-size:10px">${esc(status)}</span></td></tr>`;
    }
    h += '</tbody></table>';
    el.innerHTML = h;
  } catch(e) { /* silently skip if endpoint unavailable */ }
}

async function toggleSkill(name, enabled) {
  try {
    const r = await api('PUT','/skills/'+encodeURIComponent(name)+'/enabled', {enabled});
    if (r.ok === false) { showToast('❌ ' + r.error); loaded.skills = false; loadSkills(); return; }
    showToast(name + (enabled?' 已启用':' 已禁用'));
    loaded.skills = false;
    loadSkills();
  } catch(e) { showToast('错误: ' + e.message); }
}

function toggleSkillConfig(name) {
  const el = document.getElementById('skill-cfg-' + name);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveSkillConfig(name) {
  const cfgDiv = document.getElementById('skill-cfg-' + name);
  if (!cfgDiv) return;
  const inputs = cfgDiv.querySelectorAll('.form-input');
  const body = {};
  let hasValue = false;
  for (const input of inputs) {
    if (input.value.trim()) {
      const key = input.id.replace('scfg-' + name + '-', '');
      body[key] = input.value.trim();
      hasValue = true;
    }
  }
  if (!hasValue) return showToast('没有要保存的值');
  try {
    const r = await api('PUT','/skills/'+encodeURIComponent(name)+'/config', body);
    if (r.errors && r.errors.length) showToast('部分保存失败: ' + r.errors.map(e=>e.key+': '+e.error).join(', '));
    else showToast('✅ 配置已保存（立即生效）');
    loaded.skills = false;
    loadSkills();
  } catch(e) { showToast('错误: ' + e.message); }
}

// Page 4: Prompts
// ═══════════════════════════════════════════
let _currentPrompt = null;
let _promptMeta = {};  // name -> {label, desc}

function encodePromptPath(name) {
  // Encode each segment but preserve '/' for FastAPI {name:path}
  return name.split('/').map(encodeURIComponent).join('/');
}

async function loadPrompts() {
  const el = document.getElementById('prompts-content');
  try {
    const data = await api('GET','/prompts');
    const prompts = data.prompts;
    _promptMeta = {};
    for (const p of prompts) _promptMeta[p.name] = {label: p.label, desc: p.desc};
    let html = '';

    // Prompt list
    html += '<div class="card"><div class="card-title">Prompt 文件</div>';
    html += '<table class="tbl"><tr><th>名称</th><th>说明</th><th>大小</th><th>状态</th><th></th></tr>';
    for (const p of prompts) {
      html += `<tr>
        <td><strong>${esc(p.label)}</strong><div style="font-size:11px;color:var(--text-soft)">${esc(p.name)}</div></td>
        <td style="font-size:12px;color:var(--text-soft)">${esc(p.desc)}</td>
        <td>${p.chars} 字符</td>
        <td>${p.exists?'<span class="badge badge-ok">存在</span>':'<span class="badge badge-warn">缺失</span>'}</td>
        <td style="text-align:right"><button class="btn btn-ghost btn-sm" onclick="openPromptEditor('${esc(p.name)}')">${p.exists?'编辑':'创建'}</button></td>
      </tr>`;
    }
    html += '</table></div>';

    // Editor area (hidden until a prompt is selected)
    html += '<div id="prompt-editor-area" style="display:none">';
    html += '<div class="card">';
    html += '<div class="card-title" id="prompt-editor-title">编辑中: —</div>';
    html += '<textarea class="prompt-editor" id="prompt-textarea" oninput="updatePromptCharCount()"></textarea>';
    html += '<div class="prompt-meta"><span id="prompt-char-count">0 字符</span>';
    html += '<div><button class="btn btn-ghost btn-sm" onclick="closePromptEditor()">取消</button> ';
    html += '<button class="btn btn-primary btn-sm" onclick="savePrompt()">保存</button></div>';
    html += '</div></div></div>';

    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="card" style="color:var(--danger)">❌ ${esc(e.message)}</div>`; }
}

async function openPromptEditor(name) {
  _currentPrompt = name;
  const area = document.getElementById('prompt-editor-area');
  const textarea = document.getElementById('prompt-textarea');
  const title = document.getElementById('prompt-editor-title');
  const meta = _promptMeta[name] || {};
  title.textContent = '编辑中: ' + (meta.label || name);
  textarea.value = '';
  area.style.display = 'block';
  try {
    const data = await api('GET','/prompts/'+encodePromptPath(name));
    textarea.value = data.content;
    updatePromptCharCount();
    textarea.focus();
  } catch(e) {
    if (e.message.includes('404')) {
      // New file
      textarea.value = '';
      updatePromptCharCount();
      textarea.focus();
    } else {
      showToast('错误: ' + e.message);
    }
  }
}

function closePromptEditor() {
  _currentPrompt = null;
  const area = document.getElementById('prompt-editor-area');
  if (area) area.style.display = 'none';
}

function updatePromptCharCount() {
  const textarea = document.getElementById('prompt-textarea');
  const counter = document.getElementById('prompt-char-count');
  if (textarea && counter) counter.textContent = textarea.value.length + ' 字符';
}

async function savePrompt() {
  if (!_currentPrompt) return;
  const textarea = document.getElementById('prompt-textarea');
  const content = textarea.value;
  try {
    const r = await api('POST','/prompts/'+encodePromptPath(_currentPrompt), {content});
    const label = (_promptMeta[_currentPrompt] || {}).label || _currentPrompt;
    showToast('✅ 已保存 ' + label + '（' + r.chars + ' 字符）');
    loaded.prompts = false;
    loadPrompts();
  } catch(e) { showToast('错误: ' + e.message); }
}

// ── Prompt Dump (debug only) ─────────────────────────
let _pdMode = 'chat';
function _syncPdButtons() {
  const c = document.getElementById('pd-mode-chat');
  const t = document.getElementById('pd-mode-think');
  if (!c || !t) return;
  c.className = _pdMode === 'chat' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
  t.className = _pdMode === 'think' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
}
async function loadPromptDump(mode) {
  loaded.promptdump = true;
  if (mode === 'chat' || mode === 'think') _pdMode = mode;
  _syncPdButtons();
  const el = document.getElementById('promptdump-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> 生成中…</div>';
  try {
    const endpoint = _pdMode === 'think' ? '/think-prompt-dump' : '/prompt-dump';
    const data = await api('GET', endpoint);
    const text = data.text || '(empty)';
    const totalMatch = text.match(/Total:\s+~(\d[\d,]*) tokens/);
    const totalTok = totalMatch ? totalMatch[1] : '?';
    const modeLabel = _pdMode === 'think' ? 'Think prompt' : 'Chat prompt';
    el.innerHTML = `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span class="badge badge-info">~${esc(totalTok)} tokens</span>
          <span style="font-size:12px;color:var(--text-dim)">${esc(modeLabel)} full snapshot</span>
        </div>
      </div>
      <div class="card">
        <pre style="white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.6;max-height:80vh;overflow-y:auto;margin:0;font-family:'SF Mono',Menlo,'Courier New',monospace">${esc(text)}</pre>
      </div>
    `;
  } catch (e) {
    el.innerHTML = '<div class="loading" style="color:var(--error)">❌ ' + esc(e.message) + '</div>';
  }
}

// Migration (搬家)
// ═══════════════════════════════════════════════════════════════════════════

let _migSession = null;
let _migStats = null;
let _migModels = [];
let _migContextWindows = {};
let _migJobId = null;
let _migJobPollTimer = null;
let _migPollStart = null;
let _migResult = null;

async function loadMigration() {
  const el = document.getElementById('migration-content');
  el.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">从 ChatGPT 导入</div>
      <p style="font-size:13px;color:var(--text-soft);margin-bottom:12px">
        上传从 ChatGPT 导出的 JSON 聊天记录文件，系统将自动提取你的 AI 人格、用户画像和记忆。
      </p>
      <div style="background:var(--warning);color:#fff;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px">
        ⚠️ 提取过程使用 LLM 处理聊天记录，根据文件大小可能消耗大量 token，费用由你的 API key 承担。
      </div>
      <div class="form-group">
        <label class="form-label">选择 ChatGPT 导出文件（JSON，最大 50MB）</label>
        <input type="file" id="mig-file-input" accept=".json" class="form-input" style="padding:6px">
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-primary" onclick="migUpload()">上传并分析</button>
        <span id="mig-upload-status" style="font-size:13px"></span>
      </div>
    </div>
  `;
  // Reset state
  _migSession = null; _migStats = null; _migResult = null;
  _migJobId = null; _migPollStart = null;
  if (_migJobPollTimer) { clearInterval(_migJobPollTimer); _migJobPollTimer = null; }
}

async function migUpload() {
  const fileInput = document.getElementById('mig-file-input');
  const file = fileInput?.files?.[0];
  if (!file) return showToast('请先选择文件');
  if (file.size > 50 * 1024 * 1024) return showToast('文件超过 50MB 限制');

  const statusEl = document.getElementById('mig-upload-status');
  statusEl.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle"></span> 上传分析中...';

  const formData = new FormData();
  formData.append('file', file);
  const headers = {};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;

  try {
    const r = await fetch('/api/migration/upload', {method:'POST', headers, body:formData});
    if (!r.ok) { const t = await r.text(); throw new Error(r.status + ': ' + t); }
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || '上传失败');
    _migSession = data.session_id;
    _migStats = data;

    // Also load models
    const mdata = await api('GET', '/migration/models');
    _migModels = mdata.models || [];
    _migContextWindows = mdata.context_windows || {};

    migShowStep2();
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--danger)">❌ ${esc(e.message)}</span>`;
  }
}

function migShowStep2() {
  const el = document.getElementById('migration-content');
  const s = _migStats;

  if (_migModels.length === 0) {
    el.innerHTML = `
      <div class="card">
        <div class="card-title">⚠️ 未配置模型</div>
        <p style="font-size:13px;color:var(--text-soft)">请先到「模型」页面配置至少一个 LLM 模型，再使用搬家功能。</p>
        <button class="btn btn-ghost" style="margin-top:12px" onclick="loadMigration()">← 返回</button>
      </div>
    `;
    return;
  }

  const modelOpts = _migModels.map(m =>
    `<option value="${esc(m.name)}">${esc(m.name)} (${esc(m.model)})</option>`
  ).join('');

  el.innerHTML = `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">分析结果</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px">
        <div style="background:var(--primary-bg);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)">${s.conversation_count}</div>
          <div style="font-size:12px;color:var(--text-soft)">对话数</div>
        </div>
        <div style="background:var(--primary-bg);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)">${s.raw_message_count}</div>
          <div style="font-size:12px;color:var(--text-soft)">原始消息</div>
        </div>
        <div style="background:var(--primary-bg);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)">${s.filtered_message_count}</div>
          <div style="font-size:12px;color:var(--text-soft)">过滤后消息</div>
        </div>
        <div style="background:var(--primary-bg);padding:12px;border-radius:8px;text-align:center">
          <div style="font-size:22px;font-weight:700;color:var(--primary)">${s.estimated_tokens.toLocaleString()}</div>
          <div style="font-size:12px;color:var(--text-soft)">预估 tokens</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">选择用于提取的模型</label>
        <select id="mig-model-select" class="form-input" style="width:auto;min-width:240px" onchange="migCheckContext()">
          ${modelOpts}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">记忆提取颗粒度</label>
        <div style="display:flex;gap:16px;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="radio" name="mig-granularity" value="detailed"> 精细 <span style="color:var(--text-soft);font-size:11px">— 尽可能多，包括日常琐事</span>
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="radio" name="mig-granularity" value="standard" checked> 标准 <span style="color:var(--text-soft);font-size:11px">— 有记忆价值的，跳过纯闲聊</span>
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="radio" name="mig-granularity" value="essential"> 精简 <span style="color:var(--text-soft);font-size:11px">— 只保留关键信息</span>
          </label>
        </div>
      </div>
      <div id="mig-context-warning" style="margin-bottom:12px"></div>

      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-primary" onclick="migStartExtract()" id="mig-extract-btn">开始提取</button>
        <button class="btn btn-ghost" onclick="loadMigration()">← 返回</button>
      </div>
    </div>
  `;
  migCheckContext();
}

function migCheckContext() {
  const sel = document.getElementById('mig-model-select');
  const warn = document.getElementById('mig-context-warning');
  if (!sel || !warn) return;

  const modelName = sel.value;
  const modelEntry = _migModels.find(m => m.name === modelName);
  const modelId = modelEntry ? modelEntry.model.toLowerCase() : '';
  const tokens = _migStats.estimated_tokens;

  let ctxSize = null;
  for (const [key, val] of Object.entries(_migContextWindows)) {
    if (modelId.includes(key)) { ctxSize = val; break; }
  }

  if (!ctxSize) {
    warn.innerHTML = '<span style="font-size:12px;color:var(--text-soft)">未知模型的 context 窗口大小，无法预估是否超限</span>';
    return;
  }

  const pct = tokens / ctxSize;
  if (pct >= 0.8) {
    warn.innerHTML = `<div style="background:#FFF3E0;color:#E65100;padding:10px 14px;border-radius:8px;font-size:13px">
      ⚠️ 预估 token 数约占模型 context 的 ${Math.round(pct*100)}%（${tokens.toLocaleString()} / ${ctxSize.toLocaleString()}），内容可能被截断。建议选择 context 更大的模型。
    </div>`;
  } else {
    warn.innerHTML = `<span style="font-size:12px;color:var(--success)">✓ 预估 token 数约占 context 的 ${Math.round(pct*100)}%，可正常处理</span>`;
  }
}

async function migStartExtract() {
  const sel = document.getElementById('mig-model-select');
  const modelName = sel.value;
  if (!modelName) return showToast('请选择模型');

  const btn = document.getElementById('mig-extract-btn');
  btn.disabled = true; btn.textContent = '启动中...';

  try {
    const granularity = document.querySelector('input[name="mig-granularity"]:checked')?.value || 'standard';
    const data = await api('POST', '/migration/extract', {
      session_id: _migSession,
      model_name: modelName,
      granularity: granularity,
    });
    if (!data.ok) throw new Error(data.error || '启动失败');
    _migJobId = data.job_id;
    migShowStep3();
  } catch(e) {
    btn.disabled = false; btn.textContent = '开始提取';
    showToast('❌ ' + e.message);
  }
}

function migShowStep3() {
  const el = document.getElementById('migration-content');
  _migPollStart = Date.now();

  el.innerHTML = `
    <div class="card" style="text-align:center;padding:48px 24px">
      <div class="spinner" style="width:40px;height:40px;border-width:4px;margin:0 auto 20px"></div>
      <h3 style="color:var(--text-heading);margin-bottom:8px">正在分析聊天记录...</h3>
      <p style="color:var(--text-soft);font-size:14px;margin-bottom:4px">LLM 正在提取你的记忆和偏好</p>
      <p style="color:var(--danger);font-size:13px;font-weight:600">⚠️ 请不要关闭或刷新页面</p>
      <div id="mig-poll-status" style="margin-top:16px;font-size:12px;color:var(--text-soft)">已等待 0 秒...</div>
    </div>
  `;

  _migJobPollTimer = setInterval(migPollJob, 3000);
}

async function migPollJob() {
  try {
    const data = await api('GET', '/migration/job/status?job_id=' + _migJobId);
    const elapsed = Math.round((Date.now() - _migPollStart) / 1000);
    const pollEl = document.getElementById('mig-poll-status');
    if (pollEl) pollEl.textContent = `已等待 ${elapsed} 秒...`;

    if (data.status === 'done') {
      clearInterval(_migJobPollTimer); _migJobPollTimer = null;
      _migResult = data.result;
      migShowStep4();
    } else if (data.status === 'error') {
      clearInterval(_migJobPollTimer); _migJobPollTimer = null;
      migShowError(data.error);
    }
  } catch(e) {
    // network blip — keep polling
  }
}

function migShowError(error) {
  const el = document.getElementById('migration-content');
  el.innerHTML = `
    <div class="card" style="text-align:center;padding:32px 24px">
      <div style="font-size:40px;margin-bottom:12px">❌</div>
      <h3 style="color:var(--danger);margin-bottom:8px">提取失败</h3>
      <p style="font-size:13px;color:var(--text-soft);margin-bottom:16px;word-break:break-all">${esc(error || '未知错误')}</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-primary" onclick="migShowStep2()">重新选择模型</button>
        <button class="btn btn-ghost" onclick="loadMigration()">重新开始</button>
      </div>
    </div>
  `;
}

function migShowStep4() {
  const el = document.getElementById('migration-content');
  const r = _migResult || {};
  const items = r.memory_items || [];

  const itemRows = items.map((item, i) => `
    <tr>
      <td style="width:36px;text-align:center"><input type="checkbox" checked data-mig-item="${i}"></td>
      <td><input type="text" value="${esc(item.category||'其他')}" class="form-input" style="padding:4px 8px;font-size:12px" data-mig-cat="${i}"></td>
      <td><input type="text" value="${esc(item.content||'')}" class="form-input" style="padding:4px 8px;font-size:12px" data-mig-content="${i}"></td>
      <td style="width:70px">
        <select class="form-input" style="padding:4px;font-size:12px" data-mig-imp="${i}">
          <option value="1" ${item.importance==1?'selected':''}>★</option>
          <option value="2" ${item.importance==2?'selected':''}>★★</option>
          <option value="3" ${item.importance==3?'selected':''}>★★★</option>
        </select>
      </td>
    </tr>
  `).join('');

  // Helper to make a section card with its own save button
  function sectionCard(id, title, desc, content, height) {
    return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="card-title" style="margin-bottom:0">${title}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="mig-${id}-status" style="font-size:12px"></span>
          <button class="btn btn-primary btn-sm" onclick="migApplySection('${id}')">确认写入</button>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-soft);margin-bottom:8px">${desc}</p>
      <textarea id="mig-${id}" class="form-input" style="min-height:${height};font-size:13px;font-family:inherit;resize:vertical">${esc(content)}</textarea>
    </div>`;
  }

  el.innerHTML = `
    ${sectionCard('soul', 'Soul（AI 人格）', '提取到的 AI 性格特征和说话风格，将写入 soul.md（覆盖现有内容）', r.soul||'', '100px')}
    ${sectionCard('user', 'User（用户画像）', '提取到的用户个人信息，将写入 user.md（覆盖现有内容）', r.user_profile||'', '100px')}
    ${sectionCard('core', 'Core Memory（核心记忆）', '核心事实摘要（覆盖现有 core memory）', r.core_memory||'', '80px')}

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">Memory Items（记忆条目）</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-ghost btn-sm" onclick="migToggleAll(true)">全选</button>
          <button class="btn btn-ghost btn-sm" onclick="migToggleAll(false)">全不选</button>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-soft);margin-bottom:8px">勾选要导入的条目，可编辑内容、分类和重要性（最多导入 500 条）</p>
      ${items.length ? `
      <div style="overflow-x:auto">
        <table class="tbl" style="width:100%">
          <thead><tr>
            <th style="width:36px"></th>
            <th style="width:100px">分类</th>
            <th>内容</th>
            <th style="width:70px">重要性</th>
          </tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
      </div>` : '<p style="font-size:13px;color:var(--text-soft)">未提取到记忆条目</p>'}
      <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
        <button class="btn btn-primary btn-sm" onclick="migApplyMemories()" id="mig-mem-btn">开始导入</button>
        <span id="mig-mem-status" style="font-size:12px"></span>
      </div>
      <div id="mig-mem-progress" style="display:none;margin-top:8px">
        <div style="background:var(--bg-subtle);border-radius:4px;height:8px;overflow:hidden">
          <div id="mig-mem-bar" style="height:100%;background:var(--primary);width:0%;transition:width .3s"></div>
        </div>
        <div id="mig-mem-progress-text" style="font-size:11px;color:var(--text-soft);margin-top:4px"></div>
      </div>
    </div>

    <div style="display:flex;gap:12px;align-items:center">
      <button class="btn btn-ghost" onclick="loadMigration()">重新开始</button>
      <span style="font-size:12px;color:var(--text-soft)">未配置 embedding 时，导入的记忆条目不支持向量搜索</span>
    </div>
  `;
}

function migToggleAll(checked) {
  document.querySelectorAll('[data-mig-item]').forEach(cb => cb.checked = checked);
}

async function migApplySection(id) {
  const sectionMap = {soul: 'soul', user: 'user_profile', core: 'core_memory'};
  const section = sectionMap[id];
  if (!section) return;

  const statusEl = document.getElementById(`mig-${id}-status`);
  const content = document.getElementById(`mig-${id}`)?.value || '';
  statusEl.innerHTML = '<span style="color:var(--text-soft)">保存中...</span>';

  try {
    const data = await api('POST', '/migration/apply/section', {section, content});
    if (!data.ok) throw new Error(data.error || '保存失败');
    statusEl.innerHTML = data.written
      ? '<span style="color:var(--success)">✅ 已写入</span>'
      : '<span style="color:var(--text-soft)">⏭ 跳过（内容为空）</span>';
    loaded.prompts = false;
    if (section === 'core_memory') loaded.memory = false;
  } catch(e) {
    statusEl.innerHTML = `<span style="color:var(--danger)">❌ ${esc(e.message)}</span>`;
  }
}

async function migApplyMemories() {
  const btn = document.getElementById('mig-mem-btn');
  const statusEl = document.getElementById('mig-mem-status');
  const progressWrap = document.getElementById('mig-mem-progress');

  // Collect selected items
  const items = (_migResult?.memory_items || []).map((_, i) => {
    const cb = document.querySelector(`[data-mig-item="${i}"]`);
    const cat = document.querySelector(`[data-mig-cat="${i}"]`);
    const content = document.querySelector(`[data-mig-content="${i}"]`);
    const imp = document.querySelector(`[data-mig-imp="${i}"]`);
    return {
      category: cat?.value || '其他',
      content: content?.value || '',
      importance: parseInt(imp?.value || '1'),
      selected: cb?.checked ?? false,
    };
  });

  const selectedCount = items.filter(it => it.selected && it.content.trim()).length;
  if (!selectedCount) { showToast('没有勾选任何条目'); return; }

  btn.disabled = true; btn.textContent = '导入中...';
  statusEl.innerHTML = '';
  progressWrap.style.display = 'block';

  try {
    const data = await api('POST', '/migration/apply/memories', {memory_items: items});
    if (!data.ok) throw new Error(data.error || '启动失败');
    _migMemJobId = data.job_id;
    _migMemPollTimer = setInterval(migPollMemJob, 2000);
  } catch(e) {
    btn.disabled = false; btn.textContent = '开始导入';
    progressWrap.style.display = 'none';
    showToast('❌ ' + e.message);
  }
}

let _migMemJobId = null;
let _migMemPollTimer = null;

async function migPollMemJob() {
  try {
    const data = await api('GET', '/migration/job/status?job_id=' + _migMemJobId);
    const bar = document.getElementById('mig-mem-bar');
    const txt = document.getElementById('mig-mem-progress-text');
    const pct = data.total > 0 ? Math.round((data.progress / data.total) * 100) : 0;
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = `${data.progress || 0} / ${data.total || 0} 条`;

    if (data.status === 'done') {
      clearInterval(_migMemPollTimer); _migMemPollTimer = null;
      const btn = document.getElementById('mig-mem-btn');
      const statusEl = document.getElementById('mig-mem-status');
      if (bar) bar.style.width = '100%';
      if (btn) { btn.disabled = true; btn.textContent = '导入完成'; }
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--success)">✅ 已导入 ${data.result?.memory_items_imported || 0} 条</span>`;
      loaded.memory = false;
    } else if (data.status === 'error') {
      clearInterval(_migMemPollTimer); _migMemPollTimer = null;
      const btn = document.getElementById('mig-mem-btn');
      const statusEl = document.getElementById('mig-mem-status');
      if (btn) { btn.disabled = false; btn.textContent = '重试'; }
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--danger)">❌ ${esc(data.error || '导入失败')}</span>`;
    }
  } catch(e) { /* network blip — keep polling */ }
}
</script>
</body>
</html>
