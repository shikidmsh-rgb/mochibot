<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍡 MochiBot 管理后台</title>
<style>
:root {
  --primary: #D4785C;
  --primary-hover: #B8604A;
  --primary-bg: #FDF5F2;
  --dango-pink: #E8A0BF;
  --dango-green: #7BAE7F;
  --bg: #FAF7F4;
  --card: #FFFFFF;
  --text: #4A4543;
  --text-heading: #2D2926;
  --text-soft: #9A9593;
  --border: #E8DDD4;
  --success: #7BAE7F;
  --danger: #C9544D;
  --warning: #D4A84C;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(180,96,74,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
/* ── Sidebar ─────────────────────────── */
.sidebar { width:220px; background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:10; }
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid var(--border); text-align:center; }
.sidebar-header h1 { font-size:18px; color:var(--text-heading); }
.sidebar-header .logo { font-size:32px; display:block; margin-bottom:4px; }
.sidebar-nav { flex:1; padding:12px 8px; }
.nav-item { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:8px; cursor:pointer; font-size:14px; color:var(--text); border:none; background:none; width:100%; text-align:left; transition:background .15s; }
.nav-item:hover { background:var(--primary-bg); }
.nav-item.active { background:var(--primary-bg); color:var(--primary); font-weight:600; }
.nav-icon { font-size:16px; width:20px; text-align:center; }
/* ── Content ─────────────────────────── */
.content { margin-left:220px; flex:1; padding:24px 32px; max-width:1100px; }
.page { display:none; }
.page.active { display:block; }
.page-title { font-size:22px; font-weight:700; color:var(--text-heading); margin-bottom:20px; }
/* ── Cards ────────────────────────────── */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:var(--shadow); }
.card-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-soft); margin-bottom:12px; }
.card-row { display:flex; gap:16px; }
.card-row > .card { flex:1; }
/* ── Buttons ──────────────────────────── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 18px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:all .15s; }
.btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
.btn-primary:hover { background:var(--primary-hover); }
.btn-ghost { background:transparent; color:var(--primary); border-color:var(--border); }
.btn-ghost:hover { background:var(--primary-bg); border-color:var(--primary); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:.85; }
.btn-sm { padding:5px 12px; font-size:12px; }
/* ── Badges ───────────────────────────── */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-ok { background:#e8f5e9; color:#2e7d32; }
.badge-warn { background:#fff3e0; color:#e65100; }
.badge-err { background:#ffebee; color:#c62828; }
.badge-info { background:var(--primary-bg); color:var(--primary); }
.badge-gray { background:#f0ebe5; color:#7a7573; }
/* ── Toggle ───────────────────────────── */
.toggle { position:relative; width:42px; height:24px; display:inline-block; }
.toggle input { opacity:0; width:0; height:0; }
.toggle .slider { position:absolute; inset:0; background:#ccc; border-radius:24px; cursor:pointer; transition:.2s; }
.toggle .slider::before { content:""; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .slider { background:var(--success); }
.toggle input:checked + .slider::before { transform:translateX(18px); }
/* ── Inputs ───────────────────────────── */
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-soft); margin-bottom:4px; text-transform:uppercase; letter-spacing:.3px; }
.form-input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; color:var(--text); background:var(--card); transition:border .15s; }
.form-input:focus { outline:none; border-color:var(--primary); }
select.form-input { cursor:pointer; }
/* ── Table ────────────────────────────── */
.tbl { width:100%; border-collapse:collapse; font-size:13px; }
.tbl th { text-align:left; padding:8px 10px; border-bottom:2px solid var(--border); font-size:11px; text-transform:uppercase; color:var(--text-soft); }
.tbl td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
/* ── Toast ────────────────────────────── */
.toast { position:fixed; bottom:24px; right:24px; background:var(--text-heading); color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; z-index:999; }
.toast.show { opacity:1; transform:translateY(0); }
/* ── Modal ────────────────────────────── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:auto; }
.modal { background:var(--card); border-radius:var(--radius); padding:24px; width:520px; max-height:85vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,.15); }
.modal h3 { margin-bottom:16px; color:var(--text-heading); }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
/* ── Status check ─────────────────────── */
.check-row { display:flex; align-items:center; gap:8px; padding:6px 0; font-size:14px; }
.check-icon { font-size:16px; width:20px; text-align:center; }
/* ── Transport selector cards ────────── */
.tp-cfg-btns { display:flex; gap:8px; margin:8px 0 4px; }
.tp-cfg-btn { padding:6px 14px; border:1px solid var(--border); border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; background:var(--bg); color:var(--text); transition:all .15s; }
.tp-cfg-btn:hover { border-color:var(--primary); color:var(--primary); }
.tp-cfg-btn.active { border-color:var(--primary); background:var(--primary-bg); color:var(--primary); }
/* ── Stat cards ───────────────────────── */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.stat-number { font-size:28px; font-weight:700; color:var(--primary); }
.stat-label { font-size:12px; color:var(--text-soft); margin-top:4px; }
/* ── Skill card ───────────────────────── */
.skill-card { border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; background:var(--card); }
.skill-card.disabled .skill-header, .skill-card.disabled .skill-desc, .skill-card.disabled .skill-tools { opacity:.55; }
.skill-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.skill-name { font-size:16px; font-weight:700; color:var(--text-heading); }
.skill-desc { font-size:13px; color:var(--text-soft); margin-bottom:8px; }
.skill-tools { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:#f0ebe5; color:var(--text); }
.config-list { margin-top:8px; }
.config-item { display:flex; align-items:center; gap:6px; font-size:13px; padding:3px 0; }
/* ── Loading ──────────────────────────── */
.loading { text-align:center; padding:40px; color:var(--text-soft); }
/* ── Prompt editor ───────────────────── */
.prompt-editor { width:100%; min-height:320px; padding:12px; border:1px solid var(--border); border-radius:8px; font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; font-size:13px; line-height:1.6; color:var(--text); background:var(--card); resize:vertical; tab-size:2; }
.prompt-editor:focus { outline:none; border-color:var(--primary); }
.prompt-meta { display:flex; align-items:center; justify-content:space-between; margin-top:8px; font-size:12px; color:var(--text-soft); }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
/* ── Bot log panel ───────────────────── */
.bot-log { max-height:260px; overflow-y:auto; background:#1e1e1e; color:#d4d4d4; font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; font-size:12px; line-height:1.5; padding:10px 12px; border-radius:8px; margin-top:10px; white-space:pre-wrap; word-break:break-all; }
.bot-log::-webkit-scrollbar { width:6px; }
.bot-log::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
/* ── Mobile ───────────────────────────── */
.mobile-toggle { display:none; position:fixed; top:12px; left:12px; z-index:20; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; cursor:pointer; font-size:18px; }
.sidebar-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:9; }
@media (max-width:768px) {
  .mobile-toggle { display:block; }
  .sidebar { left:-240px; transition:left .2s; }
  .sidebar.open { left:0; }
  .sidebar-backdrop.open { display:block; }
  .content { margin-left:0; padding:60px 16px 24px; }
  /* Modal: fit mobile screens */
  .modal { width:calc(100vw - 32px); max-width:520px; padding:16px; }
  /* Cards: stack vertically */
  .card-row { flex-direction:column; }
  .card { overflow-x:auto; }
  /* Stat grid: 2 columns */
  .stat-grid { grid-template-columns:1fr 1fr; }
  /* Touch targets */
  .btn-sm { padding:8px 14px; font-size:13px; }
  /* Tables: smaller font */
  .tbl { font-size:12px; }
  /* Page title */
  .page-title { font-size:18px; }
  /* Config form rows: stack label + input vertically */
  .config-form-row { flex-direction:column !important; align-items:stretch !important; gap:6px !important; }
  .config-form-row > div[style*="min-width"] { min-width:0 !important; width:100% !important; }
  .config-form-row .form-input { width:100% !important; min-width:0 !important; }
  .config-form-row input[style*="width:100px"] { width:100% !important; }
  .config-form-row input[style*="width:260px"] { width:100% !important; }
}
</style>
</head>
<body>
<button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo">🍡</span>
    <h1>MochiBot</h1>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="nav-item active" data-page="welcome"><span class="nav-icon">🏠</span> 设置</button>
    <button class="nav-item" data-page="models"><span class="nav-icon">🤖</span> 模型</button>
    <button class="nav-item" data-page="heartbeat"><span class="nav-icon">💓</span> Heartbeat</button>
    <button class="nav-item" data-page="basic"><span class="nav-icon">⚙️</span> 基本配置</button>
    <button class="nav-item" data-page="skills"><span class="nav-icon">⚡</span> 技能</button>
    <button class="nav-item" data-page="prompts"><span class="nav-icon">📝</span> 人格 & Prompts</button>
    <button class="nav-item" data-page="memory"><span class="nav-icon">🧠</span> 记忆库</button>
    <button class="nav-item" data-page="migration"><span class="nav-icon">📦</span> 搬家</button>
    <button class="nav-item" data-page="promptdump" id="nav-promptdump" style="display:none"><span class="nav-icon">🔍</span> Prompt Dump</button>
  </nav>
  <div style="padding:8px 12px; border-top:1px solid var(--border);">
    <button onclick="restartAdminServer()" style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);border:none;background:none;width:100%;text-align:left;transition:background .15s;" onmouseover="this.style.background='var(--primary-bg)'" onmouseout="this.style.background='none'" id="admin-restart-btn">🔄 重启管理后台</button>
  </div>
</aside>

<main class="content">
<!-- ═══════ Page 0: Welcome ═══════ -->
<section id="page-welcome" class="page active">
  <h2 class="page-title">🍡 设置向导</h2>
  <div id="welcome-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 1: Models ═══════ -->
<section id="page-models" class="page">
  <h2 class="page-title">模型配置</h2>
  <div id="models-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 2: Heartbeat ═══════ -->
<section id="page-heartbeat" class="page">
  <h2 class="page-title">Heartbeat 配置</h2>
  <div id="heartbeat-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 2b: Basic Config ═══════ -->
<section id="page-basic" class="page">
  <h2 class="page-title">基本配置</h2>
  <div id="basic-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 3: Skills ═══════ -->
<section id="page-skills" class="page">
  <h2 class="page-title">技能管理</h2>
  <div id="skills-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 4: Prompts ═══════ -->
<section id="page-prompts" class="page">
  <h2 class="page-title">人格 & Prompts</h2>
  <div id="prompts-content"><div class="loading"><div class="spinner"></div> 加载中...</div></div>
</section>

<!-- ═══════ Page 5: Memory ═══════ -->
<section id="page-memory" class="page">
  <h2 class="page-title">记忆库</h2>

  <!-- Core Memory -->
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">Core Memory</div>
      <span class="badge badge-info" id="memory-token-badge">-</span>
    </div>
    <div id="memory-content">
      <div class="loading"><div class="spinner"></div> 加载中...</div>
    </div>
  </div>

  <!-- L2 Memory Items -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="card-title" style="margin-bottom:0">L2 Memory</div>
      <button class="btn btn-ghost btn-sm" onclick="searchMemoryItems(1)">↻ 刷新</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <input id="mi-q" type="text" placeholder="🔍 关键词搜索…"
        class="form-input" style="flex:1;min-width:180px;border-radius:20px;padding:8px 14px;font-size:13px"
        onkeydown="if(event.key==='Enter')searchMemoryItems(1)" />
      <select id="mi-cat" class="form-input"
        style="width:auto;border-radius:20px;padding:8px 14px;font-size:13px"
        onchange="searchMemoryItems(1)">
        <option value="">全部分类</option>
      </select>
      <select id="mi-sort" class="form-input"
        style="width:auto;border-radius:20px;padding:8px 14px;font-size:13px"
        onchange="searchMemoryItems(1)">
        <option value="importance">按重要性</option>
        <option value="updated">按更新时间</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="searchMemoryItems(1)">搜索</button>
    </div>
    <div id="l2memory-content">
      <div class="loading"><div class="spinner"></div> 加载中...</div>
    </div>
  </div>
</section>

<!-- ═══════ Page 6: Migration ═══════ -->
<section id="page-migration" class="page">
  <h2 class="page-title">📦 ChatGPT 搬家</h2>
  <div id="migration-content">
    <div class="loading"><div class="spinner"></div> 加载中...</div>
  </div>
</section>

<!-- Prompt Dump (debug only, ?debug=1) -->
<section id="page-promptdump" class="page">
  <div class="section-header">
    <h2>Prompt Dump</h2>
    <div style="display:flex;gap:6px">
      <button id="pd-mode-chat" class="btn btn-primary btn-sm" onclick="loadPromptDump('chat')">Chat</button>
      <button id="pd-mode-think" class="btn btn-ghost btn-sm" onclick="loadPromptDump('think')">Think</button>
      <button class="btn btn-ghost btn-sm" onclick="loadPromptDump()">刷新</button>
    </div>
  </div>
  <div id="promptdump-content">
    <div class="loading"><div class="spinner"></div> 点击上方按钮加载...</div>
  </div>
</section>
</main>

<!-- Modal -->
<div class="modal-overlay" id="model-modal" onclick="if(event.target===this)closeModelModal()">
  <div class="modal">
    <h3 id="model-modal-title">添加模型</h3>
    <div class="form-group"><label class="form-label">名称</label><input class="form-input" id="mm-name" placeholder="例如 my-gpt4o"></div>
    <div class="form-group"><label class="form-label">服务商</label>
      <select class="form-input" id="mm-vendor" onchange="onVendorChange()"><option value="openai">OpenAI</option><option value="deepseek">DeepSeek</option><option value="ollama">Ollama（本地）</option><option value="azure">Azure OpenAI</option><option value="anthropic">Anthropic</option><option value="custom">自定义 OpenAI 兼容</option></select>
    </div>
    <div class="form-group"><label class="form-label">模型</label><input class="form-input" id="mm-model" placeholder="例如 gpt-4o"></div>
    <div class="form-group"><label class="form-label">API Key</label><input class="form-input" id="mm-apikey" type="password" autocomplete="new-password" placeholder="sk-..."></div>
    <div class="form-group"><label class="form-label">Base URL（可选）</label><input class="form-input" id="mm-baseurl" placeholder="https://..."></div>
    <div id="mm-test-result" style="font-size:13px;margin-top:8px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModelModal()">取消</button>
      <button class="btn btn-ghost" onclick="testModelInModal()">🔌 测试</button>
      <button class="btn btn-primary" onclick="saveModelFromModal()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Memory Item Edit Modal -->
<div class="modal-overlay" id="mi-modal" onclick="if(event.target===this)closeMiModal()">
  <div class="modal">
    <h3 id="mi-modal-title">编辑记忆</h3>
    <input type="hidden" id="mi-edit-id" />
    <div class="form-group"><label class="form-label">内容</label>
      <textarea class="form-input" id="mi-edit-content" style="min-height:120px;resize:vertical;font-family:inherit"></textarea>
    </div>
    <div class="form-group"><label class="form-label">分类</label>
      <input class="form-input" id="mi-edit-category" type="text" placeholder="如：偏好、事实、事件" />
    </div>
    <div class="form-group"><label class="form-label">重要性</label>
      <select class="form-input" id="mi-edit-importance">
        <option value="1">★ 日常</option>
        <option value="2">★★ 重要</option>
        <option value="3">★★★ 关键</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeMiModal()">取消</button>
      <button class="btn btn-primary" onclick="saveMiEdit()">💾 保存</button>
    </div>
  </div>
</div>

<script>
// Persist token across page refreshes via sessionStorage (cleared when tab closes)
const _urlToken = new URLSearchParams(location.search).get('token') || '';
if (_urlToken) {
  sessionStorage.setItem('_admin_token', _urlToken);
  // Remove token from URL to prevent exposure in browser history / Referer headers
  const cleanUrl = new URL(location);
  cleanUrl.searchParams.delete('token');
  window.history.replaceState({}, '', cleanUrl);
}
const authToken = _urlToken || sessionStorage.getItem('_admin_token') || '';
let _telegramBotInfo = null; // {username, first_name} — set after successful token test
let _weixinConnected = false; // set after successful WeChat token test
let _openTransportCfg = null; // 'telegram' | 'weixin' | null — which config panel is open
let _wxQrPollTimer = null;   // QR scan poll interval
let _wxQrRefreshCount = 0;   // QR refresh counter (max 6)
let _wxQrStartTime = 0;      // overall timeout tracking
let _wxQrActiveContent = '';  // current QR URL for re-render after DOM rebuild
let _wxQrStatusHtml = '';     // current status HTML for re-render after DOM rebuild

async function api(method, path, body) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(r.status + ': ' + t); }
  return r.json();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),4000); }
function statusIcon(type) {
  const m = { ok:['var(--success)','✓'], err:['#d32f2f','✗'], warn:['var(--warning)','!'], off:['var(--border)',''] };
  const [bg,ch] = m[type] || m.off;
  return `<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${bg};color:#fff;font-size:12px;flex-shrink:0">${ch}</span>`;
}

// ── Navigation ───────────────────────────

function showTransportConfig(type) {
  // Toggle: if already open, close it; otherwise open the selected one
  _openTransportCfg = (_openTransportCfg === type) ? null : type;
  const tgCfg = document.getElementById('transport-cfg');
  const wxCfg = document.getElementById('weixin-cfg');
  const tgBtn = document.getElementById('tp-btn-telegram');
  const wxBtn = document.getElementById('tp-btn-weixin');
  if (tgCfg) tgCfg.style.display = _openTransportCfg === 'telegram' ? 'block' : 'none';
  if (wxCfg) wxCfg.style.display = _openTransportCfg === 'weixin' ? 'block' : 'none';
  if (tgBtn) tgBtn.className = 'tp-cfg-btn' + (_openTransportCfg === 'telegram' ? ' active' : '');
  if (wxBtn) wxBtn.className = 'tp-cfg-btn' + (_openTransportCfg === 'weixin' ? ' active' : '');
}

async function unbindTransport(platform) {
  if (!platform) return;
  if (!confirm('确定要解绑 ' + platform + ' 吗？Bot 将停止运行。')) return;
  try {
    if (platform === 'Telegram') {
      await api('PUT', '/env', {'TELEGRAM_BOT_TOKEN': ''});
      _telegramBotInfo = null;
    } else {
      await api('PUT', '/env', {'WEIXIN_ENABLED': 'false', 'WEIXIN_BOT_TOKEN': ''});
      _weixinConnected = false;
    }
    showToast('已解绑 ' + platform);
    await api('POST', '/bot/stop').catch(() => {});
    loaded.welcome = false;
    loadWelcome();
  } catch(e) { showToast('操作失败: ' + e.message); }
}

async function saveTransportConfig() {
  const tokenInput = document.getElementById('cfg-TELEGRAM_BOT_TOKEN');
  if (!tokenInput || !tokenInput.value.trim()) return showToast('Bot Token 不能为空');
  // Confirm if switching from WeChat
  if (_weixinConnected && !confirm('这将断开 WeChat 连接，确定切换到 Telegram？')) return;
  const token = tokenInput.value.trim();
  const statusEl = document.getElementById('tg-connect-status');
  const saveBtn = document.getElementById('tg-save-btn');

  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中...'; }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-soft)">⏳ 保存并验证中...</span>';

  try {
    // Step 1: Save to .env
    const r = await api('PUT', '/env', {'TELEGRAM_BOT_TOKEN': token});
    if (r.errors && r.errors.length) {
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ 保存失败: ' + r.errors.map(e=>esc(e.key)).join(', ') + '</span>';
      return;
    }

    // Step 2: Test connection
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-soft)">⏳ 验证 Token...</span>';
    const test = await api('POST', '/telegram/test', {token});

    if (test.ok) {
      _telegramBotInfo = {username: test.username, first_name: test.first_name};
      // Clear WeChat credentials (mutually exclusive transports)
      _weixinConnected = false;
      api('PUT', '/env', {'WEIXIN_ENABLED': 'false', 'WEIXIN_BOT_TOKEN': ''}).catch(() => {});
      if (statusEl) {
        statusEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          + '<span class="badge badge-ok" style="font-size:13px">✅ 已连接</span>'
          + '<strong>@' + esc(test.username) + '</strong>'
          + '<span style="color:var(--text-soft);font-size:12px">(' + esc(test.first_name) + ')</span>'
          + '</div>'
          + '<div style="margin-top:10px;color:var(--text-soft);font-size:13px">⏳ 正在启动 Bot...</div>';
      }
      showToast('✅ Token 验证成功，正在启动 Bot...');
      startBotAndRefresh();
    } else {
      _telegramBotInfo = null;
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ Token 无效: ' + esc(test.error) + '</span>';
    }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ 错误: ' + esc(e.message) + '</span>';
  } finally {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存并连接'; }
  }
}

async function startBotAndRefresh() {
  // Disable all restart buttons and show loading state
  document.querySelectorAll('[data-restart-btn]').forEach(b => {
    b.disabled = true; b.textContent = '重启中...';
  });
  try {
    await api('POST', '/bot/start');
    showToast('✅ Bot 重启成功，正在启动...');
  } catch(e) {
    showToast('❌ 启动失败: ' + e.message);
    document.querySelectorAll('[data-restart-btn]').forEach(b => {
      b.disabled = false; b.textContent = '重启';
    });
    return;
  }
  // Give it a moment then refresh welcome to show running state
  setTimeout(() => { loaded.welcome = false; loadWelcome(); }, 2000);
}

async function restartAdminServer() {
  if (!confirm('确定要重启管理后台吗？页面会短暂断开连接。')) return;
  const btn = document.getElementById('admin-restart-btn');
  if (btn) { btn.disabled = true; btn.textContent = '重启中...'; }
  try {
    await api('POST', '/admin/restart');
  } catch(e) {
    // Server may have already died — that's expected
  }
  showToast('🔄 管理后台重启中，等待重新连接...');
  // Poll until server is back
  const poll = setInterval(async () => {
    try {
      const r = await fetch('/api/status', {signal: AbortSignal.timeout(2000)});
      if (r.ok) { clearInterval(poll); location.reload(); }
    } catch(e) { /* still down, keep polling */ }
  }, 2000);
}

async function exportDiagnostics() {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '导出中...'; }
  try {
    const opts = {method:'GET', headers:{}};
    if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
    const r = await fetch('/api/diagnostics/export', opts);
    if (!r.ok) throw new Error(r.status + ': ' + await r.text());
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mochibot-diagnostics-' + new Date().toISOString().replace(/[T:]/g, '-').slice(0, 19) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ 诊断报告已下载');
  } catch(e) {
    showToast('❌ 导出失败: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📋 导出诊断报告'; }
  }
}

async function startWeixinQR() {
  const statusEl = document.getElementById('wx-qr-status');
  const canvasEl = document.getElementById('wx-qr-canvas');
  const btnEl = document.getElementById('wx-qr-btn');
  const cancelEl = document.getElementById('wx-qr-cancel');

  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '获取二维码中...'; }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-soft)">⏳ 正在获取二维码...</span>';
  if (canvasEl) { canvasEl.style.display = 'none'; canvasEl.getContext('2d').clearRect(0,0,canvasEl.width,canvasEl.height); }

  try {
    const r = await api('POST', '/weixin/qr');
    if (!r.ok) {
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ ' + esc(r.error) + '</span>';
      if (btnEl) { btnEl.disabled = false; btnEl.textContent = '扫码登录'; }
      return;
    }
    // Render QR code to canvas
    if (canvasEl) {
      renderQRToCanvas(canvasEl, r.qrcode_img_content, 220);
      canvasEl.style.display = 'block';
    }
    _wxQrActiveContent = r.qrcode_img_content;
    _wxQrStatusHtml = '<span style="color:var(--text-soft)">📱 用微信扫描上方二维码</span>';
    if (statusEl) statusEl.innerHTML = _wxQrStatusHtml;
    if (btnEl) btnEl.style.display = 'none';
    if (cancelEl) cancelEl.style.display = 'inline-block';

    // Start polling
    _wxQrRefreshCount = 0;
    _wxQrStartTime = Date.now();
    pollWeixinQR(r.qrcode);
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ ' + esc(e.message) + '</span>';
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = '扫码登录'; }
  }
}

function pollWeixinQR(qrcode) {
  cancelWeixinQR(); // clear any existing timer
  const QR_TIMEOUT_MS = 480000; // 8 min
  const QR_MAX_REFRESH = 6;
  const POLL_INTERVAL_MS = 3000;

  _wxQrPollTimer = setInterval(async () => {
    // Overall timeout
    if (Date.now() - _wxQrStartTime > QR_TIMEOUT_MS) {
      cancelWeixinQR();
      const s = document.getElementById('wx-qr-status');
      if (s) s.innerHTML = '<span style="color:var(--danger)">⏰ 扫码超时，请重试</span>';
      resetWxQrBtn();
      return;
    }
    try {
      const r = await api('POST', '/weixin/qr/poll', {qrcode});

      if (r.status === 'scaned') {
        const s = document.getElementById('wx-qr-status');
        _wxQrStatusHtml = '<span style="color:var(--primary)">✅ 已扫码，请在手机上确认...</span>';
        if (s) s.innerHTML = _wxQrStatusHtml;
      } else if (r.status === 'expired') {
        _wxQrRefreshCount++;
        if (_wxQrRefreshCount > QR_MAX_REFRESH) {
          cancelWeixinQR();
          const s = document.getElementById('wx-qr-status');
          if (s) s.innerHTML = '<span style="color:var(--danger)">⏰ 二维码已过期多次，请重试</span>';
          resetWxQrBtn();
          return;
        }
        // Fetch new QR
        const s = document.getElementById('wx-qr-status');
        if (s) s.innerHTML = '<span style="color:var(--text-soft)">🔄 二维码已过期，自动刷新中...</span>';
        try {
          const fresh = await api('POST', '/weixin/qr');
          if (fresh.ok) {
            const c = document.getElementById('wx-qr-canvas');
            if (c) renderQRToCanvas(c, fresh.qrcode_img_content, 220);
            _wxQrActiveContent = fresh.qrcode_img_content;
            _wxQrStatusHtml = '<span style="color:var(--text-soft)">📱 用微信扫描上方二维码</span>';
            if (s) s.innerHTML = _wxQrStatusHtml;
            // Restart poll with new qrcode ID
            cancelWeixinQR();
            pollWeixinQR(fresh.qrcode);
            return;
          }
        } catch(e) { /* keep polling with old ID */ }
      } else if (r.status === 'confirmed') {
        cancelWeixinQR();
        _wxQrActiveContent = '';
        _wxQrStatusHtml = '';
        _weixinConnected = true;
        _telegramBotInfo = null; // mutually exclusive
        const s = document.getElementById('wx-qr-status');
        if (s) s.innerHTML = '<span class="badge badge-ok" style="font-size:13px">✅ 登录成功！Token 已自动保存</span>'
          + '<div style="margin-top:8px;color:var(--text-soft);font-size:13px">⏳ 正在启动 Bot...</div>';
        const c = document.getElementById('wx-qr-canvas');
        if (c) c.style.display = 'none';
        const cancel = document.getElementById('wx-qr-cancel');
        if (cancel) cancel.style.display = 'none';
        showToast('✅ WeChat 登录成功，正在启动...');
        startBotAndRefresh();
        return;
      } else if (r.status === 'error') {
        cancelWeixinQR();
        const s = document.getElementById('wx-qr-status');
        if (s) s.innerHTML = '<span style="color:var(--danger)">❌ ' + esc(r.error) + '</span>';
        resetWxQrBtn();
        return;
      }
      // status === 'wait' → continue polling
    } catch(e) {
      // Transient error — keep polling
    }
  }, POLL_INTERVAL_MS);
}

function cancelWeixinQR() {
  if (_wxQrPollTimer) { clearInterval(_wxQrPollTimer); _wxQrPollTimer = null; }
}

function resetWxQrBtn() {
  const btn = document.getElementById('wx-qr-btn');
  const cancel = document.getElementById('wx-qr-cancel');
  if (btn) { btn.disabled = false; btn.textContent = '扫码登录'; btn.style.display = 'inline-block'; }
  if (cancel) cancel.style.display = 'none';
}

function stopWeixinQR() {
  cancelWeixinQR();
  _wxQrActiveContent = '';
  _wxQrStatusHtml = '';
  const c = document.getElementById('wx-qr-canvas');
  if (c) c.style.display = 'none';
  const s = document.getElementById('wx-qr-status');
  if (s) s.innerHTML = '';
  resetWxQrBtn();
}

function toggleWxManualInput() {
  const el = document.getElementById('wx-manual-input');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── QR Code Generator (Nayuki qrcodegen, MIT License) ──
// Project Nayuki — https://www.nayuki.io/page/qr-code-generator-library
// Compiled from TypeScript source. Supports QR versions 1-40, all 4 EC levels.
var qrcodegen;
(function (qrcodegen) {
    class QrCode {
        static encodeText(text, ecl) {
            const segs = qrcodegen.QrSegment.makeSegments(text);
            return QrCode.encodeSegments(segs, ecl);
        }
        static encodeBinary(data, ecl) {
            const seg = qrcodegen.QrSegment.makeBytes(data);
            return QrCode.encodeSegments([seg], ecl);
        }
        static encodeSegments(segs, ecl, minVersion = 1, maxVersion = 40, mask = -1, boostEcl = true) {
            if (!(QrCode.MIN_VERSION <= minVersion && minVersion <= maxVersion && maxVersion <= QrCode.MAX_VERSION)
                || mask < -1 || mask > 7)
                throw new RangeError("Invalid value");
            let version;
            let dataUsedBits;
            for (version = minVersion;; version++) {
                const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
                const usedBits = QrSegment.getTotalBits(segs, version);
                if (usedBits <= dataCapacityBits) {
                    dataUsedBits = usedBits;
                    break;
                }
                if (version >= maxVersion)
                    throw new RangeError("Data too long");
            }
            for (const newEcl of [QrCode.Ecc.MEDIUM, QrCode.Ecc.QUARTILE, QrCode.Ecc.HIGH]) {
                if (boostEcl && dataUsedBits <= QrCode.getNumDataCodewords(version, newEcl) * 8)
                    ecl = newEcl;
            }
            let bb = [];
            for (const seg of segs) {
                appendBits(seg.mode.modeBits, 4, bb);
                appendBits(seg.numChars, seg.mode.numCharCountBits(version), bb);
                for (const b of seg.getData())
                    bb.push(b);
            }
            assert(bb.length == dataUsedBits);
            const dataCapacityBits = QrCode.getNumDataCodewords(version, ecl) * 8;
            assert(bb.length <= dataCapacityBits);
            appendBits(0, Math.min(4, dataCapacityBits - bb.length), bb);
            appendBits(0, (8 - bb.length % 8) % 8, bb);
            assert(bb.length % 8 == 0);
            for (let padByte = 0xEC; bb.length < dataCapacityBits; padByte ^= 0xEC ^ 0x11)
                appendBits(padByte, 8, bb);
            let dataCodewords = [];
            while (dataCodewords.length * 8 < bb.length)
                dataCodewords.push(0);
            bb.forEach((b, i) => dataCodewords[i >>> 3] |= b << (7 - (i & 7)));
            return new QrCode(version, ecl, dataCodewords, mask);
        }
        constructor(version, errorCorrectionLevel, dataCodewords, msk) {
            this.version = version;
            this.errorCorrectionLevel = errorCorrectionLevel;
            this.modules = [];
            this.isFunction = [];
            if (version < QrCode.MIN_VERSION || version > QrCode.MAX_VERSION)
                throw new RangeError("Version value out of range");
            if (msk < -1 || msk > 7)
                throw new RangeError("Mask value out of range");
            this.size = version * 4 + 17;
            let row = [];
            for (let i = 0; i < this.size; i++)
                row.push(false);
            for (let i = 0; i < this.size; i++) {
                this.modules.push(row.slice());
                this.isFunction.push(row.slice());
            }
            this.drawFunctionPatterns();
            const allCodewords = this.addEccAndInterleave(dataCodewords);
            this.drawCodewords(allCodewords);
            if (msk == -1) {
                let minPenalty = 1000000000;
                for (let i = 0; i < 8; i++) {
                    this.applyMask(i);
                    this.drawFormatBits(i);
                    const penalty = this.getPenaltyScore();
                    if (penalty < minPenalty) {
                        msk = i;
                        minPenalty = penalty;
                    }
                    this.applyMask(i);
                }
            }
            assert(0 <= msk && msk <= 7);
            this.mask = msk;
            this.applyMask(msk);
            this.drawFormatBits(msk);
            this.isFunction = [];
        }
        getModule(x, y) {
            return 0 <= x && x < this.size && 0 <= y && y < this.size && this.modules[y][x];
        }
        drawFunctionPatterns() {
            for (let i = 0; i < this.size; i++) {
                this.setFunctionModule(6, i, i % 2 == 0);
                this.setFunctionModule(i, 6, i % 2 == 0);
            }
            this.drawFinderPattern(3, 3);
            this.drawFinderPattern(this.size - 4, 3);
            this.drawFinderPattern(3, this.size - 4);
            const alignPatPos = this.getAlignmentPatternPositions();
            const numAlign = alignPatPos.length;
            for (let i = 0; i < numAlign; i++) {
                for (let j = 0; j < numAlign; j++) {
                    if (!(i == 0 && j == 0 || i == 0 && j == numAlign - 1 || i == numAlign - 1 && j == 0))
                        this.drawAlignmentPattern(alignPatPos[i], alignPatPos[j]);
                }
            }
            this.drawFormatBits(0);
            this.drawVersion();
        }
        drawFormatBits(mask) {
            const data = this.errorCorrectionLevel.formatBits << 3 | mask;
            let rem = data;
            for (let i = 0; i < 10; i++)
                rem = (rem << 1) ^ ((rem >>> 9) * 0x537);
            const bits = (data << 10 | rem) ^ 0x5412;
            assert(bits >>> 15 == 0);
            for (let i = 0; i <= 5; i++)
                this.setFunctionModule(8, i, getBit(bits, i));
            this.setFunctionModule(8, 7, getBit(bits, 6));
            this.setFunctionModule(8, 8, getBit(bits, 7));
            this.setFunctionModule(7, 8, getBit(bits, 8));
            for (let i = 9; i < 15; i++)
                this.setFunctionModule(14 - i, 8, getBit(bits, i));
            for (let i = 0; i < 8; i++)
                this.setFunctionModule(this.size - 1 - i, 8, getBit(bits, i));
            for (let i = 8; i < 15; i++)
                this.setFunctionModule(8, this.size - 15 + i, getBit(bits, i));
            this.setFunctionModule(8, this.size - 8, true);
        }
        drawVersion() {
            if (this.version < 7)
                return;
            let rem = this.version;
            for (let i = 0; i < 12; i++)
                rem = (rem << 1) ^ ((rem >>> 11) * 0x1F25);
            const bits = this.version << 12 | rem;
            assert(bits >>> 18 == 0);
            for (let i = 0; i < 18; i++) {
                const color = getBit(bits, i);
                const a = this.size - 11 + i % 3;
                const b = Math.floor(i / 3);
                this.setFunctionModule(a, b, color);
                this.setFunctionModule(b, a, color);
            }
        }
        drawFinderPattern(x, y) {
            for (let dy = -4; dy <= 4; dy++) {
                for (let dx = -4; dx <= 4; dx++) {
                    const dist = Math.max(Math.abs(dx), Math.abs(dy));
                    const xx = x + dx;
                    const yy = y + dy;
                    if (0 <= xx && xx < this.size && 0 <= yy && yy < this.size)
                        this.setFunctionModule(xx, yy, dist != 2 && dist != 4);
                }
            }
        }
        drawAlignmentPattern(x, y) {
            for (let dy = -2; dy <= 2; dy++) {
                for (let dx = -2; dx <= 2; dx++)
                    this.setFunctionModule(x + dx, y + dy, Math.max(Math.abs(dx), Math.abs(dy)) != 1);
            }
        }
        setFunctionModule(x, y, isDark) {
            this.modules[y][x] = isDark;
            this.isFunction[y][x] = true;
        }
        addEccAndInterleave(data) {
            const ver = this.version;
            const ecl = this.errorCorrectionLevel;
            if (data.length != QrCode.getNumDataCodewords(ver, ecl))
                throw new RangeError("Invalid argument");
            const numBlocks = QrCode.NUM_ERROR_CORRECTION_BLOCKS[ecl.ordinal][ver];
            const blockEccLen = QrCode.ECC_CODEWORDS_PER_BLOCK[ecl.ordinal][ver];
            const rawCodewords = Math.floor(QrCode.getNumRawDataModules(ver) / 8);
            const numShortBlocks = numBlocks - rawCodewords % numBlocks;
            const shortBlockLen = Math.floor(rawCodewords / numBlocks);
            let blocks = [];
            const rsDiv = QrCode.reedSolomonComputeDivisor(blockEccLen);
            for (let i = 0, k = 0; i < numBlocks; i++) {
                let dat = data.slice(k, k + shortBlockLen - blockEccLen + (i < numShortBlocks ? 0 : 1));
                k += dat.length;
                const ecc = QrCode.reedSolomonComputeRemainder(dat, rsDiv);
                if (i < numShortBlocks)
                    dat.push(0);
                blocks.push(dat.concat(ecc));
            }
            let result = [];
            for (let i = 0; i < blocks[0].length; i++) {
                blocks.forEach((block, j) => {
                    if (i != shortBlockLen - blockEccLen || j >= numShortBlocks)
                        result.push(block[i]);
                });
            }
            assert(result.length == rawCodewords);
            return result;
        }
        drawCodewords(data) {
            if (data.length != Math.floor(QrCode.getNumRawDataModules(this.version) / 8))
                throw new RangeError("Invalid argument");
            let i = 0;
            for (let right = this.size - 1; right >= 1; right -= 2) {
                if (right == 6)
                    right = 5;
                for (let vert = 0; vert < this.size; vert++) {
                    for (let j = 0; j < 2; j++) {
                        const x = right - j;
                        const upward = ((right + 1) & 2) == 0;
                        const y = upward ? this.size - 1 - vert : vert;
                        if (!this.isFunction[y][x] && i < data.length * 8) {
                            this.modules[y][x] = getBit(data[i >>> 3], 7 - (i & 7));
                            i++;
                        }
                    }
                }
            }
            assert(i == data.length * 8);
        }
        applyMask(mask) {
            if (mask < 0 || mask > 7)
                throw new RangeError("Mask value out of range");

function renderQRToCanvas(canvas, text, size) {
  const ctx = canvas.getContext('2d');
  try {
    const qr = qrcodegen.QrCode.encodeText(text, qrcodegen.QrCode.Ecc.LOW);
    const moduleCount = qr.size;
    const minCellPx = 4;
    const effectiveSize = Math.max(size, (moduleCount + 8) * minCellPx);
    canvas.width = effectiveSize;
    canvas.height = effectiveSize;
    canvas.style.maxWidth = size + 'px';
    canvas.style.height = 'auto';
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, effectiveSize, effectiveSize);
    const cellSize = effectiveSize / (moduleCount + 8);
    const offset = (effectiveSize - cellSize * moduleCount) / 2;
    ctx.fillStyle = '#000000';
    for (let r = 0; r < moduleCount; r++) {
      for (let c = 0; c < moduleCount; c++) {
        if (qr.getModule(c, r)) {
          ctx.fillRect(
            Math.round(offset + c * cellSize),
            Math.round(offset + r * cellSize),
            Math.ceil(cellSize),
            Math.ceil(cellSize)
          );
        }
      }
    }
  } catch(e) {
    canvas.width = size;
    canvas.height = size;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#ff0000';
    ctx.font = '12px sans-serif';
    ctx.fillText('QR Error', 10, size/2);
  }
}

async function saveWeixinConfig() {
  const tokenInput = document.getElementById('cfg-WEIXIN_BOT_TOKEN');
  if (!tokenInput || !tokenInput.value.trim()) return showToast('Bot Token 不能为空');
  // Confirm if switching from Telegram
  if (_telegramBotInfo && !confirm('这将断开 Telegram 连接，确定切换到 WeChat？')) return;
  const token = tokenInput.value.trim();
  const allowedInput = document.getElementById('cfg-WEIXIN_ALLOWED_USERS');
  const allowed = allowedInput ? allowedInput.value.trim() : '';
  const statusEl = document.getElementById('wx-connect-status');
  const saveBtn = document.getElementById('wx-save-btn');

  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '保存中...'; }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-soft)">⏳ 保存并验证中...</span>';

  try {
    // Step 1: Save to .env
    const envData = {
      'WEIXIN_ENABLED': 'true',
      'WEIXIN_BOT_TOKEN': token,
    };
    if (allowed) envData['WEIXIN_ALLOWED_USERS'] = allowed;
    const r = await api('PUT', '/env', envData);
    if (r.errors && r.errors.length) {
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ 保存失败: ' + r.errors.map(e=>esc(e.key)).join(', ') + '</span>';
      return;
    }

    // Step 2: Test connection
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-soft)">⏳ 验证 Token...</span>';
    const test = await api('POST', '/weixin/test', {token});

    if (test.ok) {
      _weixinConnected = true;
      // Clear Telegram credentials (mutually exclusive transports)
      _telegramBotInfo = null;
      api('PUT', '/env', {'TELEGRAM_BOT_TOKEN': ''}).catch(() => {});
      if (statusEl) statusEl.innerHTML = '<span class="badge badge-ok" style="font-size:13px">✅ Token 有效</span>'
        + '<div style="margin-top:8px;color:var(--text-soft);font-size:13px">⏳ 重启 Bot 以启用 WeChat...</div>';
      showToast('✅ WeChat Token 验证成功，正在重启...');
      startBotAndRefresh();
    } else {
      _weixinConnected = false;
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ Token 无效: ' + esc(test.error) + '</span>';
    }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger)">❌ 错误: ' + esc(e.message) + '</span>';
  } finally {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '保存并连接'; }
  }
}

let _welcomePollTimer = null;
let _welcomeLastRunning = null;
let _welcomeLastOwner = null;

function startWelcomePolling() {
  stopWelcomePolling();
  _welcomePollTimer = setInterval(async () => {
    try {
      const st = await api('GET', '/bot/status');
      const full = await api('GET', '/status');
      const ownerNow = full.config_status?.owner_user_id?.set || false;
      if (st.running !== _welcomeLastRunning || ownerNow !== _welcomeLastOwner) {
        _welcomeLastRunning = st.running;
        _welcomeLastOwner = ownerNow;
        loaded.welcome = false;
        loadWelcome();
      }
    } catch(e) { /* ignore transient errors */ }
  }, 8000);
}
function stopWelcomePolling() {
  if (_welcomePollTimer) { clearInterval(_welcomePollTimer); _welcomePollTimer = null; }
  _welcomeLastRunning = null;
  _welcomeLastOwner = null;
}

function _fmtBytes(b) {
  if (b >= 1024*1024) return (b/1024/1024).toFixed(1)+' MB';
  return (b/1024).toFixed(1)+' KB';
}

function renderCheckupBody(c) {
  let h = '';

  // Prompt size
  const ps = c.prompt_size;
  if (ps && !ps.error) {
    h += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:6px">Prompt 体积</div>';
    const prompts = ps.identity_prompts || {};
    for (const [name, info] of Object.entries(prompts)) {
      const short = name.includes('/') ? name.split('/').pop() : name;
      h += `<div class="check-row">${statusIcon('ok')}<span>${esc(short)}</span>`
        + `<span class="badge badge-info" style="margin-left:auto">${info.tokens} tokens</span></div>`;
    }
    h += `<div class="check-row" style="font-weight:600"><span>合计</span>`
      + `<span class="badge badge-info" style="margin-left:auto">${ps.identity_total_tokens} tokens</span></div>`;
    const cm = ps.core_memory || {};
    const cmBadge = cm.over_budget ? 'badge-warn' : 'badge-ok';
    h += `<div class="check-row" style="margin-top:4px">${cm.over_budget ? statusIcon('warn') : statusIcon('ok')}`
      + `<span>Core Memory</span>`
      + `<span class="badge ${cmBadge}" style="margin-left:auto">${cm.tokens} / ${cm.max_tokens} tokens</span></div>`;
    h += '</div>';
  } else if (ps && ps.error) {
    h += `<div style="margin-bottom:12px;color:var(--danger)">Prompt 体积: ${esc(ps.error)}</div>`;
  }

  // Database
  const db = c.database;
  if (db && !db.error) {
    h += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:6px">数据库</div>';
    const intOk = db.integrity_ok;
    h += `<div class="check-row">${intOk ? statusIcon('ok') : statusIcon('err')}`
      + `<span>大小: ${_fmtBytes(db.file_size_bytes || 0)}</span>`
      + `<span class="badge ${intOk ? 'badge-ok' : 'badge-err'}" style="margin-left:auto">`
      + `完整性: ${intOk ? 'ok' : '异常'}</span></div>`;
    const tc = db.table_counts || {};
    const parts = Object.entries(tc).map(([t,n]) => `${t} ${n}`).join(' | ');
    h += `<div style="font-size:12px;color:var(--text-soft);margin-top:4px;padding-left:28px">${esc(parts)}</div>`;
    h += '</div>';
  } else if (db && db.error) {
    h += `<div style="margin-bottom:12px;color:var(--danger)">数据库: ${esc(db.error)}</div>`;
  }

  // Memory
  const mem = c.memory;
  if (mem && !mem.error) {
    h += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:6px">记忆系统</div>';
    h += `<div class="check-row">${statusIcon('ok')}<span>总记忆: ${mem.total} 条</span></div>`;
    const cats = mem.categories || {};
    if (Object.keys(cats).length) {
      const catStr = Object.entries(cats).map(([k,v]) => `${k} ${v}`).join(', ');
      h += `<div style="font-size:12px;color:var(--text-soft);padding-left:28px">${esc(catStr)}</div>`;
    }
    h += `<div class="check-row">${statusIcon('ok')}<span>KG: ${mem.kg_entities} 实体, ${mem.kg_active_triples} 三元组</span></div>`;
    h += `<div class="check-row">${statusIcon('ok')}<span>回收站: ${mem.trash_count} 条</span></div>`;
    h += '</div>';
  } else if (mem && mem.error) {
    h += `<div style="margin-bottom:12px;color:var(--danger)">记忆系统: ${esc(mem.error)}</div>`;
  }

  // Runtime
  const rt = c.runtime;
  if (rt && !rt.error) {
    h += '<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:6px">运行状态</div>';
    const errN = rt.error_count_24h || 0;
    h += `<div class="check-row">${errN === 0 ? statusIcon('ok') : statusIcon('warn')}`
      + `<span>24h 错误: ${errN} 条</span></div>`;
    const maint = rt.last_maintenance;
    h += `<div class="check-row">${statusIcon('ok')}<span>上次维护: ${maint ? esc(maint).substring(0, 80) : '暂无记录'}</span></div>`;
    h += '</div>';
  } else if (rt && rt.error) {
    h += `<div style="margin-bottom:12px;color:var(--danger)">运行状态: ${esc(rt.error)}</div>`;
  }

  // Timestamp
  if (c.checked_at) {
    h += `<div style="font-size:11px;color:var(--text-soft);margin-top:4px">检查时间: ${esc(c.checked_at)}</div>`;
  }
  return h;
}

function renderCheckupCard(c) {
  let h = '<div class="card" id="checkup-card">';
  h += '<div class="card-title" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleCheckup()">';
  h += '<span>系统体检 <span id="checkup-toggle-hint" style="font-size:11px;color:var(--text-soft);font-weight:400">▶ 点击展开</span></span>';
  h += '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();refreshCheckup()" style="font-size:12px;padding:2px 8px">刷新</button>';
  h += '</div>';
  h += '<div id="checkup-body" style="display:none">';
  h += renderCheckupBody(c);
  h += '</div></div>';
  return h;
}

function toggleCheckup() {
  const body = document.getElementById('checkup-body');
  const hint = document.getElementById('checkup-toggle-hint');
  if (!body) return;
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (hint) hint.textContent = hidden ? '▼' : '▶ 点击展开';
}

async function refreshCheckup() {
  const body = document.getElementById('checkup-body');
  if (!body) return;
  body.innerHTML = '<div style="color:var(--text-soft);font-size:13px">正在检查…</div>';
  try {
    const data = await api('GET', '/checkup');
    if (data && data.ok) {
      body.innerHTML = renderCheckupBody(data);
    } else {
      body.innerHTML = '<div style="color:var(--danger)">体检失败: ' + esc(data?.error || 'unknown') + '</div>';
    }
  } catch(e) {
    body.innerHTML = '<div style="color:var(--danger)">体检请求失败: ' + esc(e.message) + '</div>';
  }
}

const VENDOR_PRESETS = [
  { vendor: 'openai',    label: 'OpenAI',             provider: 'openai',       baseUrl: '',                                placeholder: 'gpt-4o' },
  { vendor: 'deepseek',  label: 'DeepSeek',           provider: 'openai',       baseUrl: 'https://api.deepseek.com/v1',     placeholder: 'deepseek-chat' },

  { vendor: 'anthropic', label: 'Anthropic',          provider: 'anthropic',    baseUrl: '',                                placeholder: 'claude-sonnet-4-20250514' },
  { vendor: 'custom',    label: '自定义 OpenAI 兼容',  provider: 'openai',       baseUrl: '',                                placeholder: '' },
];

const EMB_VENDOR_PRESETS = [
  { vendor: 'openai',   label: 'OpenAI',            provider: 'openai',       baseUrl: '',                            placeholder: 'text-embedding-3-small' },
  { vendor: 'deepseek', label: 'DeepSeek',          provider: 'openai',       baseUrl: 'https://api.deepseek.com/v1', placeholder: 'deepseek-embedding' },
  { vendor: 'ollama',   label: 'Ollama（本地）',     provider: 'ollama',       baseUrl: 'http://localhost:11434/v1',   placeholder: 'nomic-embed-text' },
  { vendor: 'azure',    label: 'Azure OpenAI',      provider: 'azure_openai', baseUrl: '',                            placeholder: 'text-embedding-3-small' },
  { vendor: 'custom',   label: '自定义 OpenAI 兼容', provider: 'openai',       baseUrl: '',                            placeholder: '' },
  { vendor: 'none',     label: '禁用',              provider: 'none',         baseUrl: '',                            placeholder: '' },
];

function _normalizeUrl(u) { return (u || '').toLowerCase().replace(/\/+$/, '').replace(/\/v\d+$/, ''); }

function resolveVendorLabel(provider, baseUrl, presets) {
  presets = presets || VENDOR_PRESETS;
  const url = _normalizeUrl(baseUrl);
  for (const p of presets) {
    if (p.provider === provider && p.baseUrl) {
      if (url && url.startsWith(_normalizeUrl(p.baseUrl))) return p.label;
    }
  }
  if (provider === 'anthropic') return 'Anthropic';
  if (provider === 'azure_openai') return 'Azure OpenAI';
  if (provider === 'openai' && !url) return 'OpenAI';
  if (provider === 'none') return '禁用';
  return '自定义兼容';
}

function resolveVendorKey(provider, baseUrl, presets) {
  presets = presets || VENDOR_PRESETS;
  const url = _normalizeUrl(baseUrl);
  for (const p of presets) {
    if (p.provider === provider && p.baseUrl) {
      if (url && url.startsWith(_normalizeUrl(p.baseUrl))) return p.vendor;
    }
  }
  if (provider === 'anthropic') return 'anthropic';
  if (provider === 'azure_openai') return 'azure';
  if (provider === 'none') return 'none';
  if (provider === 'openai' && !url) return 'openai';
  return 'custom';
}

      deep: '在后台 Heartbeat 干活的模型，不和你直接对话',

        <td><strong>${esc(tier)}</strong><div style="font-size:11px;color:var(--text-soft);margin-top:2px;max-width:200px">${esc(tierDescs[tier])}</div></td>

    const embVendorKey = embConfigured ? resolveVendorKey(embProvider, embCfg.base_url, EMB_VENDOR_PRESETS) : '';
    const embVendorLabel = embConfigured ? resolveVendorLabel(embProvider, embCfg.base_url, EMB_VENDOR_PRESETS) : '';

    html += `<div class="card"><div class="card-title">Embedding 配置 ${embBadge}</div>`;

    // Summary row (shown when configured)
    html += `<div id="emb-summary" style="display:${embConfigured ? 'block' : 'none'}">`;
    html += '<table class="tbl"><tr><th>服务商</th><th>模型</th><th>Key</th><th></th></tr>';
    html += `<tr>
      <td><span class="badge badge-info">${esc(embVendorLabel)}</span></td>
      <td>${esc(embCfg.model || '（默认）')}</td>
      <td>${embCfg.api_key_set ? '<span class="badge badge-ok">已设置</span>' : '<span class="badge badge-warn">未设置</span>'}</td>
      <td style="text-align:right">
        <button class="btn btn-ghost btn-sm" onclick="openEmbeddingEdit()">编辑</button>
        <button class="btn btn-ghost btn-sm" onclick="testEmbeddingSummary(this)">测试</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteEmbeddingConfig()">删除</button>
      </td></tr>`;
    html += '</table></div>';

    // Edit form (shown when not configured, or when editing)
    html += `<div id="emb-form" style="display:${embConfigured ? 'none' : 'block'}">`;
    const apiKeyBadge = embCfg.api_key_set ? ' <span class="badge badge-ok" style="margin-left:6px">已设置</span>' : '';
    // Vendor selector
    html += `<div class="form-group"><label class="form-label">服务商</label>
      <select class="form-input" id="emb-vendor" onchange="onEmbVendorChange()">
        ${EMB_VENDOR_PRESETS.map(p => `<option value="${p.vendor}" ${(embConfigured ? embVendorKey : (embProvider === 'none' || !embProvider ? 'none' : '')) === p.vendor ? 'selected' : ''}>${esc(p.label)}</option>`).join('')}

    // advanced
    html += `<div id="emb-advanced-toggle" style="margin-top:8px;cursor:pointer;font-size:13px;color:var(--text-soft);user-select:none;display:none" onclick="toggleEmbeddingAdvanced()">
      <span id="emb-adv-arrow">▸</span> 高级设置</div>`;

      <div class="form-group"><label class="form-label">缓存最大条数</label>

      <div class="form-group"><label class="form-label">缓存 TTL（秒）</label>
        <input class="form-input" id="emb-cache-ttl" type="number" value="${embCfg.cache_ttl_s}" placeholder="300"></div>
    </div>`;
    // save/cancel buttons
    html += `<div style="margin-top:12px">
      <button class="btn btn-primary" onclick="saveEmbeddingConfig()">保存</button>
      <button class="btn btn-ghost" onclick="testEmbedding(this)">🔌 测试连接</button>
      ${embConfigured ? '<button class="btn btn-ghost" onclick="closeEmbeddingEdit()">取消</button>' : ''}
